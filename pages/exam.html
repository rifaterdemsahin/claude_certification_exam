<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Exam Mode</h1>
        <p>Mock exam with realistic formatting</p>
    </header>

    <div class="container">
        <div class="exam-container">
            <div id="exam-content"></div>
        </div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function initExam() {
            state.examData = shuffleArray([...questionsData]).slice(0, 20);
            state.examIndex = 0;
            state.examSelected = null;
            state.examShowExplanation = false;
            state.examAnswers = {};
            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('exam-content');
            const q = state.examData[state.examIndex];

            if (!q) {
                showExamResults();
                return;
            }

            const options = generateOptionsForQuestion(q);
            const letterEmojis = { 'A': '🅰️', 'B': '🅱️', 'C': '🅲', 'D': '🅳' };
            const answeredCount = Object.keys(state.examAnswers).length;
            const unansweredCount = state.examData.length - answeredCount;

            container.innerHTML = `
                <div class="exam-card fade-in">
                    <div class="quiz-meta">
                        <span class="card-category cat-${q.category}">${categories[q.category].name}</span>
                        <span>Question ${state.examIndex + 1} of ${state.examData.length}</span>
                    </div>

                    <div class="exam-progress-bar">
                        <div class="progress-label">Exam Progress</div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${(answeredCount / state.examData.length) * 100}%"></div>
                        </div>
                        <div class="progress-stats">
                            <span>${answeredCount} answered</span>
                            <span>${unansweredCount} unanswered</span>
                        </div>
                        ${unansweredCount > 0 ? `
                            <div class="unanswered-warning">
                                ⚠️ ${unansweredCount} question${unansweredCount > 1 ? 's' : ''} unanswered
                            </div>
                        ` : ''}
                    </div>

                    <div class="exam-question">${escapeHtml(q.question)}</div>

                    <div class="exam-options">
                        ${options.map((opt, idx) => {
                            const letter = String.fromCharCode(65 + idx);
                            const emoji = letterEmojis[letter] || '';
                            let cls = 'exam-option';
                            if (state.examSelected === opt) cls += ' selected';
                            if (state.examShowExplanation) {
                                if (opt === q.answer) cls += ' correct';
                                else if (opt === state.examSelected && opt !== q.answer) cls += ' incorrect';
                            }
                            return `<button class="${cls}" onclick="selectExamAnswer('${escapeHtml(opt)}')">
                                ${emoji} ${escapeHtml(opt)}
                            </button>`;
                        }).join('')}
                    </div>

                    ${state.examShowExplanation ? `
                        <div class="quiz-explanation">
                            <strong>${state.examSelected === q.answer ? '✅ Correct!' : '❌ Incorrect'}</strong>
                            <p>${escapeHtml(q.answer)}</p>
                        </div>
                    ` : ''}

                    <div class="exam-nav">
                        <button onclick="prevExamQuestion()" ${state.examIndex === 0 ? 'disabled' : ''}>Previous</button>
                        <button onclick="nextExamQuestion()">
                            ${state.examIndex < state.examData.length - 1 ? 'Next' : 'Finish Exam'}
                        </button>
                    </div>
                </div>
            `;
        }

        function selectExamAnswer(answer) {
            const q = state.examData[state.examIndex];
            state.examSelected = answer;
            state.examAnswers[q.id] = answer;
            state.examShowExplanation = true;
            renderExam();
        }

        function nextExamQuestion() {
            if (state.examIndex < state.examData.length - 1) {
                state.examIndex++;
                state.examSelected = state.examAnswers[state.examData[state.examIndex].id] || null;
                state.examShowExplanation = state.examSelected !== null;
                renderExam();
            } else {
                showExamResults();
            }
        }

        function prevExamQuestion() {
            if (state.examIndex > 0) {
                state.examIndex--;
                state.examSelected = state.examAnswers[state.examData[state.examIndex].id] || null;
                state.examShowExplanation = state.examSelected !== null;
                renderExam();
            }
        }

        function showExamResults() {
            const container = document.getElementById('exam-content');
            let correct = 0;
            state.examData.forEach(q => {
                if (state.examAnswers[q.id] === q.answer) correct++;
            });

            const percentage = Math.round((correct / state.examData.length) * 100);

            container.innerHTML = `
                <div class="exam-card fade-in">
                    <h2 style="text-align:center;margin-bottom:24px;">Exam Complete!</h2>

                    <div class="stats-grid" style="margin-bottom:24px;">
                        <div class="stat-card">
                            <div class="stat-number">${correct}</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${state.examData.length - correct}</div>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${percentage}%</div>
                            <div class="stat-label">Score</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${state.examData.length}</div>
                            <div class="stat-label">Total</div>
                        </div>
                    </div>

                    <h3 style="margin-bottom:16px;">Review Answers</h3>
                    ${state.examData.map((q, idx) => {
                        const userAnswer = state.examAnswers[q.id];
                        const isCorrect = userAnswer === q.answer;
                        return `
                            <div style="padding:16px;margin-bottom:12px;background:var(--bg-primary);border-radius:8px;border-left:4px solid ${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">
                                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                    <span style="font-weight:600;">${idx + 1}. ${escapeHtml(q.question)}</span>
                                    <span style="color:${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">${isCorrect ? '✅' : '❌'}</span>
                                </div>
                                <div style="font-size:0.9em;color:var(--text-secondary);">
                                    <div>Your answer: ${escapeHtml(userAnswer || 'Not answered')}</div>
                                    ${!isCorrect ? `<div>Correct answer: ${escapeHtml(q.answer)}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}

                    <div class="exam-nav" style="margin-top:24px;">
                        <button onclick="initExam()">Retake Exam</button>
                        <a href="../index.html" class="nav-tab">Back to Home</a>
                    </div>
                </div>
            `;
        }

        // Initialize
        initExam();
    </script>
</body>
</html>
