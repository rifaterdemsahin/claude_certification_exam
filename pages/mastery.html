<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Path - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .mastery-answer {
            display: none;
            margin-top: 8px;
            padding: 10px;
            background: rgba(16,185,129,0.1);
            border-left: 3px solid var(--accent-green);
            border-radius: 0 6px 6px 0;
            font-size: 0.9em;
            color: var(--accent-green);
            line-height: 1.5;
        }
        .mastery-card:hover .mastery-answer {
            display: block;
        }
        .mastery-content {
            flex: 1;
            cursor: pointer;
        }
        .mastery-hint {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Mastery Path</h1>
        <p>Track your progress through all 100 questions</p>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="total-count">100</div><div class="stat-label">Total Questions</div></div>
            <div class="stat-card"><div class="stat-number" id="mastered-count">0</div><div class="stat-label">Mastered</div></div>
            <div class="stat-card"><div class="stat-number" id="completion-pct">0%</div><div class="stat-label">Completion</div></div>
            <div class="stat-card"><div class="stat-number" id="remaining-count">100</div><div class="stat-label">Remaining</div></div>
        </div>

        <div class="progress-section">
            <h2>Overall Progress</h2>
            <div class="progress-text" id="progress-text">0 of 100 mastered (0%)</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="filter-bar">
            <span>Filter:</span>
            <button class="filter-btn active" onclick="setFilter('all')">All</button>
            <button class="filter-btn" onclick="setFilter('unmastered')">Unmastered</button>
            <button class="filter-btn" onclick="setFilter('mastered')">Mastered</button>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search questions..." oninput="filterQuestions(this.value)">
                <button class="search-clear" onclick="clearSearch()">×</button>
            </div>
        </div>

        <div id="mastery-list" class="mastery-container"></div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <p>Created by Rifat Erdem Sahin</p>
        <div class="footer-links">
            <a href="../index.html">🏠 Home</a>
            <a href="cards.html">🃏 Cards</a>
            <a href="quiz.html">📝 Quiz</a>
            <a href="exam.html">📋 Exam</a>
            <a href="mastery.html">🎯 Mastery</a>
            <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        let currentFilter = 'all';
        let searchQuery = '';

        function renderMastery() {
            const container = document.getElementById('mastery-list');
            let filteredQuestions = questionsData;

            if (currentFilter === 'mastered') {
                filteredQuestions = questionsData.filter(q => state.progress[q.id]);
            } else if (currentFilter === 'unmastered') {
                filteredQuestions = questionsData.filter(q => !state.progress[q.id]);
            }

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filteredQuestions = filteredQuestions.filter(q =>
                    q.question.toLowerCase().includes(query) ||
                    q.answer.toLowerCase().includes(query) ||
                    q.uid.toLowerCase().includes(query)
                );
            }

            container.innerHTML = filteredQuestions.map(q => {
                const isMastered = state.progress[q.id];
                return `
                    <div class="mastery-card ${isMastered ? 'mastered' : ''}">
                        <div class="mastery-number">${q.id}</div>
                        <div class="mastery-content">
                            <div class="mastery-question">${escapeHtml(q.question)}</div>
                            <div class="mastery-category">${q.uid} • ${categories[q.category].name}</div>
                            <div class="mastery-answer">${escapeHtml(q.answer)}</div>
                            <div class="mastery-hint">Hover to reveal answer</div>
                        </div>
                        <button class="mastery-status ${isMastered ? 'mastered' : 'pending'}" onclick="event.stopPropagation(); toggleMastery(${q.id})">
                            ${isMastered ? '✓ Mastered' : 'Mark'}
                        </button>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function updateStats() {
            const totalMastered = Object.keys(state.progress).length;
            const total = questionsData.length;
            const percentage = Math.round((totalMastered / total) * 100);

            document.getElementById('total-count').textContent = total;
            document.getElementById('mastered-count').textContent = totalMastered;
            document.getElementById('completion-pct').textContent = percentage + '%';
            document.getElementById('remaining-count').textContent = total - totalMastered;
            document.getElementById('progress-text').textContent = `${totalMastered} of ${total} mastered (${percentage}%)`;
            document.getElementById('progress-fill').style.width = percentage + '%';
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === filter);
            });
            renderMastery();
        }

        function filterQuestions(query) {
            searchQuery = query;
            const clearBtn = document.querySelector('.search-clear');
            clearBtn.classList.toggle('visible', query.length > 0);
            renderMastery();
        }

        function clearSearch() {
            document.querySelector('.search-input').value = '';
            searchQuery = '';
            document.querySelector('.search-clear').classList.remove('visible');
            renderMastery();
        }

        function toggleMastery(id) {
            if (state.progress[id]) {
                delete state.progress[id];
            } else {
                state.progress[id] = true;
            }
            saveProgress(state.progress);
            renderMastery();
        }

        // Initialize
        renderMastery();
    </script>
</body>
</html>
