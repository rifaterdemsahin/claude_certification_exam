<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Multiplayer</h1>
        <p>Play with friends using MQTT</p>
    </header>

    <div class="container">
        <div class="mp-container">
            <div id="mp-content">
                <div class="mp-panel mp-center">
                    <h2>Multiplayer Quiz</h2>
                    <p style="color:var(--text-secondary);margin:16px 0;">Create or join a room to play with friends</p>

                    <div class="mp-grid">
                        <div class="mp-panel">
                            <h3 style="text-align:center;margin-bottom:16px;">Create Room (Director)</h3>
                            <div class="mp-form">
                                <input type="text" id="mp-director-name" placeholder="Your name" value="Director" />
                                <select id="mp-category">
                                    <option value="0">All Categories</option>
                                    <option value="1">Agentic Architecture</option>
                                    <option value="2">Tool Design & MCP</option>
                                    <option value="3">Claude Code Workflows</option>
                                    <option value="4">Prompt Engineering</option>
                                    <option value="5">Context & Reliability</option>
                                </select>
                                <input type="number" id="mp-count" placeholder="Number of questions" value="20" min="1" max="100" />
                                <button onclick="createRoom()">Create Room</button>
                            </div>
                        </div>
                        <div class="mp-panel">
                            <h3 style="text-align:center;margin-bottom:16px;">Join Room (Participant)</h3>
                            <div class="mp-form">
                                <input type="text" id="mp-join-name" placeholder="Your name" value="Player" />
                                <input type="text" id="mp-join-room" placeholder="Room code (e.g. AB12CD)" />
                                <button onclick="joinRoom()">Join Room</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <p>Created by Rifat Erdem Sahin</p>
        <div class="footer-links">
            <a href="../index.html">🏠 Home</a>
            <a href="cards.html">🃏 Cards</a>
            <a href="quiz.html">📝 Quiz</a>
            <a href="exam.html">📋 Exam</a>
            <a href="mastery.html">🎯 Mastery</a>
            <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Multiplayer functions (simplified - full implementation requires MQTT broker)
        function createRoom() {
            const name = document.getElementById('mp-director-name').value || 'Director';
            const category = parseInt(document.getElementById('mp-category').value);
            const count = parseInt(document.getElementById('mp-count').value) || 20;

            mpState.myName = name;
            mpState.role = 'director';
            mpState.roomId = generateRoomCode();

            let filteredQuestions = questionsData;
            if (category > 0) {
                filteredQuestions = questionsData.filter(q => q.category === category);
            }
            mpState.questions = shuffleArray(filteredQuestions).slice(0, count);

            alert(`Room created! Code: ${mpState.roomId}\n\nNote: Full multiplayer requires an MQTT broker connection.`);
        }

        function joinRoom() {
            const name = document.getElementById('mp-join-name').value || 'Player';
            const roomId = document.getElementById('mp-join-room').value;

            if (!roomId) {
                alert('Please enter a room code');
                return;
            }

            mpState.myName = name;
            mpState.role = 'participant';
            mpState.roomId = roomId;

            alert(`Joining room: ${roomId}\n\nNote: Full multiplayer requires an MQTT broker connection.`);
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // Check URL for room parameter
        function checkUrlForRoom() {
            const url = new URL(window.location.href);
            const room = url.searchParams.get('room');
            if (room) {
                document.getElementById('mp-join-room').value = room;
            }
        }

        // Initialize
        checkUrlForRoom();
    </script>
</body>
</html>
