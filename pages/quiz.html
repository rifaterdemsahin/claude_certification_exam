<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Mode - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .quiz-actions-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .quiz-actions-bar button {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
            transition: all 0.2s;
        }
        .quiz-actions-bar button:hover { border-color: var(--accent-blue); }
        .quiz-actions-bar .fav-active { border-color: var(--accent-yellow); color: var(--accent-yellow); background: rgba(251,191,36,0.1); }
        .quiz-actions-bar .mastered-active { border-color: var(--accent-green); color: var(--accent-green); background: rgba(16,185,129,0.1); }
        .quiz-image-section {
            margin: 16px 0;
            text-align: center;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        .quiz-image-section img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            object-fit: contain;
        }
        .quiz-links-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .quiz-link-btn {
            flex: 1;
            min-width: 100px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--accent-blue);
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .quiz-link-btn:hover { border-color: var(--accent-blue); background: rgba(56,189,248,0.1); }
        .reset-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .reset-btn {
            padding: 10px 20px;
            border: 1px solid var(--accent-red);
            background: transparent;
            color: var(--accent-red);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-family: inherit;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: rgba(239,68,68,0.1); }
        @media (max-width: 640px) {
            .quiz-links-row { flex-direction: column; }
            .quiz-link-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Quiz Mode</h1>
        <p>Interactive quiz with immediate feedback</p>
    </header>

    <div class="container">
        <div class="quiz-actions-bar">
            <button onclick="resetQuiz()" class="reset-btn">🔄 Reset Quiz</button>
        </div>
        <div class="quiz-container">
            <div id="quiz-content"></div>
        </div>
    </div>

     <footer class="app-footer">
         <p>Claude Developer Certification Study App</p>
         <p>Created by Rifat Erdem Sahin</p>
         <div class="footer-links">
             <a href="../index.html">🏠 Home</a>
             <a href="cards.html">🃏 Cards</a>
             <a href="quiz.html">📝 Quiz</a>
             <a href="practice_exam.html">📝 Practice</a>
             <a href="exam.html">📋 Exam</a>
             <a href="mastery.html">🎯 Mastery</a>
             <a href="incorrect_summary.html">❌ Incorrect</a>
             <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
         </div>
     </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function initQuiz() {
            state.quizQuestions = shuffleArray([...questionsData]);
            state.quizIndex = 0;
            state.quizSelected = null;
            state.quizShowExplanation = false;
            state.quizShowHint = false;
            state.quizOptions = [];
            renderQuiz();
        }

        function resetQuiz() {
            if (confirm('Reset quiz progress and start over?')) {
                initQuiz();
            }
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-content');
            const q = state.quizQuestions[state.quizIndex];

            if (!q) {
                container.innerHTML = `
                    <div class="quiz-card">
                        <h2>Quiz Complete!</h2>
                        <p>You've answered all ${state.quizQuestions.length} questions.</p>
                        <div class="quiz-nav">
                            <button onclick="initQuiz()">Restart Quiz</button>
                        </div>
                    </div>
                `;
                return;
            }

            const hint = questionHints[q.id];
            const isMastered = state.progress[q.id];
            const isFavorite = state.favorites.includes(q.id);
            const options = state.quizOptions.length > 0 ? state.quizOptions : generateOptionsForQuestion(q);
            if (state.quizOptions.length === 0) state.quizOptions = options;

            const letterEmojis = { 'A': '🅰️', 'B': '🅱️', 'C': '🅲', 'D': '🅳' };

            container.innerHTML = `
                <div class="quiz-card fade-in">
                    <div class="quiz-meta">
                        <span class="card-category cat-${q.category}">${categories[q.category].name}</span>
                        <span>Question ${state.quizIndex + 1} of ${state.quizQuestions.length}</span>
                    </div>

                    <div class="exam-progress-bar">
                        <div class="progress-label">Progress</div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${((state.quizIndex) / state.quizQuestions.length) * 100}%"></div>
                        </div>
                        <div class="progress-stats">
                            <span>${state.quizIndex} completed</span>
                            <span>${state.quizQuestions.length - state.quizIndex} remaining</span>
                        </div>
                    </div>

                    <div class="quiz-actions-bar">
                        <button class="${isFavorite ? 'fav-active' : ''}" onclick="toggleFavorite(${q.id}); renderQuiz();">
                            ${isFavorite ? '★ Favorited' : '☆ Favorite'}
                        </button>
                        <button class="${isMastered ? 'mastered-active' : ''}" onclick="toggleMastery(${q.id}); renderQuiz();">
                            ${isMastered ? '✓ Mastered' : 'Mark Mastered'}
                        </button>
                    </div>

                    <div class="quiz-question">${escapeHtml(q.question)}</div>

                    <div class="quiz-options">
                        ${options.map((opt, idx) => {
                            const letter = String.fromCharCode(65 + idx);
                            const emoji = letterEmojis[letter] || '';
                            let cls = 'quiz-option';
                            if (state.quizSelected !== null) {
                                if (opt === q.answer) cls += ' correct';
                                else if (opt === state.quizSelected && opt !== q.answer) cls += ' incorrect';
                            }
                            return `<button class="${cls}" onclick="selectAnswer('${escapeHtml(opt)}')" ${state.quizSelected !== null ? 'disabled' : ''}>
                                ${emoji} ${escapeHtml(opt)}
                            </button>`;
                        }).join('')}
                    </div>

                    ${state.quizShowHint && hint ? `
                        <div class="quiz-hint-box">
                            <div class="emoji">${hint.emoji}</div>
                            <div class="hint-text">${escapeHtml(hint.text)}</div>
                            <div class="memory">${escapeHtml(hint.memory)}</div>
                        </div>
                    ` : ''}

                    ${state.quizSelected !== null ? `
                        <div class="quiz-explanation">
                            <strong>${state.quizSelected === q.answer ? '✅ Correct!' : '❌ Incorrect'}</strong>
                            <p>${escapeHtml(q.answer)}</p>
                        </div>

                        <div class="quiz-image-section">
                            <img src="${q.imageUrl}" alt="${escapeHtml(q.question)}" onerror="this.parentElement.style.display='none'" loading="lazy">
                        </div>

                        <div class="quiz-links-row">
                            <a href="${q.googleImageUrl}" target="_blank" class="quiz-link-btn">🔍 Google Images</a>
                            <a href="${q.relatedVideoUrl}" target="_blank" class="quiz-link-btn">🎬 YouTube</a>
                            <a href="markdown_renderer.html?url=${encodeURIComponent(q.notesUrl)}&title=${encodeURIComponent(q.uid)}" class="quiz-link-btn">📝 Notes</a>
                        </div>
                    ` : ''}

                    <div class="quiz-nav">
                        <button onclick="prevQuestion()" ${state.quizIndex === 0 ? 'disabled' : ''}>Previous</button>
                        ${state.quizSelected === null ? `
                            <button class="quiz-hint-btn" onclick="showQuizHint()">Show Hint</button>
                        ` : ''}
                        <button onclick="nextQuestion()">${state.quizIndex < state.quizQuestions.length - 1 ? 'Next' : 'Finish'}</button>
                    </div>
                </div>
            `;
        }

        function selectAnswer(answer) {
            if (state.quizSelected !== null) return;
            state.quizSelected = answer;
            state.quizShowExplanation = true;

            const q = state.quizQuestions[state.quizIndex];
            if (answer === q.answer) {
                state.progress[q.id] = true;
                saveProgress(state.progress);
                showMasteredReward();
            }

            renderQuiz();
        }

        function showQuizHint() {
            state.quizShowHint = true;
            renderQuiz();
        }

        function nextQuestion() {
            state.quizIndex++;
            state.quizSelected = null;
            state.quizShowExplanation = false;
            state.quizShowHint = false;
            state.quizOptions = [];
            renderQuiz();
        }

        function prevQuestion() {
            if (state.quizIndex > 0) {
                state.quizIndex--;
                state.quizSelected = null;
                state.quizShowExplanation = false;
                state.quizShowHint = false;
                state.quizOptions = [];
                renderQuiz();
            }
        }

        function toggleFavorite(id) {
            const index = state.favorites.indexOf(id);
            if (index === -1) {
                state.favorites.push(id);
            } else {
                state.favorites.splice(index, 1);
            }
            setCookie('claude_cert_favorites', JSON.stringify(state.favorites), 365);
        }

        function toggleMastery(id) {
            if (state.progress[id]) {
                delete state.progress[id];
            } else {
                state.progress[id] = true;
                showMasteredReward();
            }
            saveProgress(state.progress);
        }

        function showMasteredReward() {
            const reward = document.createElement('div');
            reward.className = 'mastered-reward';
            reward.innerHTML = `
                <div class="mastered-reward-inner">
                    <div class="emoji">🎉</div>
                    <div>Correct!</div>
                </div>
            `;
            document.body.appendChild(reward);
            setTimeout(() => reward.remove(), 1200);
        }

        // Initialize
        initQuiz();
    </script>
</body>
</html>
