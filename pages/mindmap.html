        function buildMindmap(filterCat) {
            let lines = ['mindmap'];
            lines.push('  root(("Claude Dev Cert<br/>100 Memory Cards"))');

            for (let c = 1; c <= 5; c++) {
                if (filterCat && filterCat !== c) continue;
                const cat = categories[c];
                const catCards = cards.filter(card => card.cat === c);
                lines.push(`    ${cat.name}`);

                catCards.forEach(card => {
                    const cleanText = card.text.replace(/"/g, '\\"');
                    lines.push(`      "${card.emoji} ${cleanText}"`);
                });
            }
            return lines.join('\n');
        }

        function buildFlowchart(filterCat) {
            let lines = ['flowchart TD'];
            const styleRoot = 'classDef root fill:#0f172a,stroke:#38bdf8,stroke-width:3px,color:#e2e8f0';
            const styleCat1 = 'classDef cat1 fill:#1e293b,stroke:#ef4444,stroke-width:2px,color:#e2e8f0';
            const styleCat2 = 'classDef cat2 fill:#1e293b,stroke:#3b82f6,stroke-width:2px,color:#e2e8f0';
            const styleCat3 = 'classDef cat3 fill:#1e293b,stroke:#10b981,stroke-width:2px,color:#e2e8f0';
            const styleCat4 = 'classDef cat4 fill:#1e293b,stroke:#f59e0b,stroke-width:2px,color:#e2e8f0';
            const styleCat5 = 'classDef cat5 fill:#1e293b,stroke:#a855f7,stroke-width:2px,color:#e2e8f0';
            lines.push(styleRoot);
            lines.push(styleCat1);
            lines.push(styleCat2);
            lines.push(styleCat3);
            lines.push(styleCat4);
            lines.push(styleCat5);

            lines.push(`ROOT["рџ§  Claude Dev Cert<br/>100 Memory Cards"]:::root`);

            for (let c = 1; c <= 5; c++) {
                if (filterCat && filterCat !== c) continue;
                const cat = categories[c];
                const nodeId = `CAT${c}`;
                lines.push(`${nodeId}["${cat.name}"]:::cat${c}`);
                lines.push(`ROOT --> ${nodeId}`);

                const catCards = cards.filter(card => card.cat === c);
                catCards.forEach(card => {
                    const cardId = `Q${card.id}`;
                    const cleanText = card.text.replace(/"/g, '\\"');
                    lines.push(`${cardId}["${card.emoji}<br/>${cleanText}"]:::cat${c}`);
                    lines.push(`${nodeId} --> ${cardId}`);
                });
            }
            return lines.join('\n');
        }

        let currentFilter = null;

        function showMap(view) {
            document.querySelectorAll('.cat-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filterCat = null;
            if (view === 'cat1') filterCat = 1;
            if (view === 'cat2') filterCat = 2;
            if (view === 'cat3') filterCat = 3;
            if (view === 'cat4') filterCat = 4;
            if (view === 'cat5') filterCat = 5;
            currentFilter = filterCat;

            const container = document.getElementById('mindmap-container');
            container.innerHTML = '';
            container.removeAttribute('data-processed');

            const graph = buildFlowchart(filterCat);
            container.textContent = graph;

            mermaid.init(undefined, container).then(() => {
                renderLegend(filterCat);
            });
        }

            const visibleCards = filterCat ? cards.filter(c => c.cat === filterCat) : cards;

                        <span class="emoji">${card.emoji}</span>
                        <strong>Q${card.id}</strong>
                        <span style="color:${categories[card.cat].color};font-size:0.75em;">${categories[card.cat].name}</span>
                    </div>
                    <div style="color:var(--text-secondary);font-size:0.8em;">${card.text}</div>
                    <div style="color:var(--text-muted);font-size:0.75em;margin-top:4px;">${card.rel}</div>
                `;
                legend.appendChild(item);
            });
        }

        // Initial render
        showMap('all');
        document.querySelector('.cat-tab').classList.add('active');
    </script>
</body>
</html>
