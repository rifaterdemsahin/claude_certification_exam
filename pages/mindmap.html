            cursor: grab;
        }
        #canvas-container.grabbing { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%; }

        .controls {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px;
        }
        .ctrl-btn {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border);

        .zoom-row { display: flex; gap: 6px; }
        .hint {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 16px; font-size: 0.75em; color: var(--text-secondary);
            line-height: 1.5; max-width: 220px;
        }
        .hint kbd {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 4px; padding: 1px 5px; font-family: inherit;
            font-size: 0.9em; color: var(--text-primary);
        }

        /* Card modal overlay */
        .card-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card-overlay.active { display: flex; }
        .card-modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; max-width: 480px; width: 100%;
            max-height: 80vh; overflow-y: auto;
        }
        .card-modal h2 { font-size: 1.2em; margin-bottom: 8px; }
        .card-modal .cat-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.7em; font-weight: 600; margin-bottom: 12px;
        }

        .card-modal .mem { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 16px; }
        .card-modal .rel-list { margin-bottom: 16px; }
        .card-modal .rel-list li {
            list-style: none; padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85em; color: var(--text-secondary);
        }
        .card-modal .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .card-modal .actions a, .card-modal .actions button {
            flex: 1; min-width: 120px; text-align: center;
            padding: 8px 12px; border-radius: 8px;

        }
        .close-x {

            color: var(--text-muted); font-size: 1.4em; cursor: pointer;
        }

        const nodes = new Map();
        const catCounts = [0,0,0,0,0,0];

            const col = c.cat - 1;
            const row = catCounts[c.cat]++;
            const x = colX[col];
            const y = 120 + row * ROW_GAP;
            nodes.set(c.id, { ...c, x, y, w: NODE_W, h: NODE_H, rel: c.rel.slice(0,3) });
        });

        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        let dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);

        // Camera
        let cam = { x: 0, y: 0, z: 1 };
        const minZ = 0.2, maxZ = 2.5;

        function worldToScreen(wx, wy) {
            return {
                x: (wx - cam.x) * cam.z + canvas.width / (2*dpr),
                y: (wy - cam.y) * cam.z + canvas.height / (2*dpr)
            };
        }
        function screenToWorld(sx, sy) {
            return {
                x: (sx - canvas.width / (2*dpr)) / cam.z + cam.x,
                y: (sy - canvas.height / (2*dpr)) / cam.z + cam.y
            };
        }

        function drawRoundedRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawBezierLink(x1, y1, x2, y2, color) {
            ctx.save();
            ctx.strokeStyle = color + '55';
            ctx.lineWidth = 1.5 * cam.z;
            ctx.beginPath();
            const cp1x = x1 + (x2 - x1) * 0.5;
            const cp1y = y1;
            const cp2x = x1 + (x2 - x1) * 0.5;
            const cp2y = y2;
            ctx.moveTo(x1, y1);
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
            ctx.stroke();
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);

            // Draw relationships first (behind nodes)
            nodes.forEach(node => {
                node.rel.forEach(targetId => {
                    const target = nodes.get(targetId);
                    if (!target) return;
                    const sx1 = node.x + node.w;
                    const sy1 = node.y + node.h/2;
                    const sx2 = target.x;
                    const sy2 = target.y + target.h/2;
                    const p1 = worldToScreen(sx1, sy1);
                    const p2 = worldToScreen(sx2, sy2);
                    // Cull off-screen
                    const bounds = canvas.getBoundingClientRect();
                    if (p1.x < -200 || p1.x > bounds.width + 200) return;
                    if (p1.y < -200 || p1.y > bounds.height + 200) return;
                    if (p2.x < -200 || p2.x > bounds.width + 200) return;
                    if (p2.y < -200 || p2.y > bounds.height + 200) return;
                    const col = categories[node.cat].color;
                    drawBezierLink(sx1, sy1, sx2, sy2, col);
                });
            });

            // Draw nodes
            nodes.forEach(node => {
                const p = worldToScreen(node.x, node.y);
                const w = node.w * cam.z;
                const h = node.h * cam.z;
                if (p.x + w < -50 || p.x > canvas.width/dpr + 50) return;
                if (p.y + h < -50 || p.y > canvas.height/dpr + 50) return;

                const col = categories[node.cat].color;
                ctx.save();

                // Shadow
                ctx.shadowColor = col + '44';
                ctx.shadowBlur = 12 * cam.z;
                ctx.shadowOffsetY = 4 * cam.z;

                // Card body
                ctx.fillStyle = '#1e293b';
                drawRoundedRect(ctx, p.x, p.y, w, h, 10 * cam.z);
                ctx.fill();
                ctx.shadowColor = 'transparent';

                // Border
                ctx.strokeStyle = col + 'aa';
                ctx.lineWidth = 2 * cam.z;
                drawRoundedRect(ctx, p.x, p.y, w, h, 10 * cam.z);
                ctx.stroke();

                // Category stripe (left edge)
                ctx.fillStyle = col;
                ctx.beginPath();
                ctx.moveTo(p.x + 10*cam.z, p.y);
                ctx.lineTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + h);
                ctx.lineTo(p.x + 10*cam.z, p.y + h);
                ctx.closePath();
                ctx.fill();

                // Emoji
                ctx.font = `${Math.max(10, 22 * cam.z)}px Inter, sans-serif`;
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#e2e8f0';
                ctx.fillText(node.emoji, p.x + 16*cam.z, p.y + h/2 - 6*cam.z);

                // Text (clamped)
                ctx.font = `${Math.max(8, 11 * cam.z)}px Inter, sans-serif`;
                ctx.fillStyle = '#94a3b8';
                const txt = node.text.length > 18 ? node.text.slice(0,17)+'…' : node.text;
                ctx.fillText(txt, p.x + 16*cam.z, p.y + h/2 + 12*cam.z);

                // ID badge
                ctx.font = `${Math.max(7, 9 * cam.z)}px Inter, sans-serif`;
                ctx.fillStyle = col;
                ctx.textAlign = 'right';
                ctx.fillText(`#${node.id}`, p.x + w - 8*cam.z, p.y + h - 10*cam.z);

                ctx.restore();
            });

            // Draw column labels
            for (let c = 1; c <= 5; c++) {
                const p = worldToScreen(colX[c-1] + NODE_W/2, 50);
                if (p.x < -100 || p.x > canvas.width/dpr + 100) continue;
                ctx.save();
                ctx.font = `bold ${Math.max(10, 14 * cam.z)}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = categories[c].color;
                ctx.fillText(categories[c].name, p.x, p.y);
                ctx.restore();
            }
        }

        // Interactions
        let dragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};
        const container = document.getElementById('canvas-container');

        container.addEventListener('mousedown', e => {
            dragging = true;
            container.classList.add('grabbing');
            dragStart = {x: e.clientX, y: e.clientY};
            camStart = {x: cam.x, y: cam.y};
        });
        window.addEventListener('mouseup', () => { dragging = false; container.classList.remove('grabbing'); });
        window.addEventListener('mousemove', e => {
            if (!dragging) return;
            cam.x = camStart.x - (e.clientX - dragStart.x) / cam.z;
            cam.y = camStart.y - (e.clientY - dragStart.y) / cam.z;
            requestAnimationFrame(draw);
        });

        container.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const before = screenToWorld(mx, my);
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            cam.z = Math.max(minZ, Math.min(maxZ, cam.z * factor));
            const after = screenToWorld(mx, my);
            cam.x += (after.x - before.x);
            cam.y += (after.y - before.y);
            requestAnimationFrame(draw);
        }, { passive: false });

        const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false };
        window.addEventListener('keydown', e => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        window.addEventListener('keyup', e => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });
        function panLoop() {
            const speed = 12 / cam.z;
            let moved = false;
            if (keys.w || keys.ArrowUp) { cam.y -= speed; moved = true; }
            if (keys.s || keys.ArrowDown) { cam.y += speed; moved = true; }
            if (keys.a || keys.ArrowLeft) { cam.x -= speed; moved = true; }
            if (keys.d || keys.ArrowRight) { cam.x += speed; moved = true; }
            if (moved) requestAnimationFrame(draw);
            requestAnimationFrame(panLoop);
        }
        panLoop();

        container.addEventListener('click', e => {
            if (dragging) return;
            const rect = container.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const wp = screenToWorld(mx, my);
            // Hit test
            for (const node of nodes.values()) {
                if (wp.x >= node.x && wp.x <= node.x + node.w && wp.y >= node.y && wp.y <= node.y + node.h) {
                    openModal(node);
                    return;
                }
            }
        });

        function zoomBy(delta) {
            cam.z = Math.max(minZ, Math.min(maxZ, cam.z + delta));
            requestAnimationFrame(draw);
        }
        function resetView() {
            cam.x = (colX[2] + NODE_W/2);
            cam.y = (120 + (catCounts[3] * ROW_GAP)/2);
            cam.z = 0.85;
            requestAnimationFrame(draw);
        }

        // Modal
        const overlay = document.getElementById('cardOverlay');
        const modal = document.getElementById('cardModal');
        function openModal(node) {
            const cat = categories[node.cat];
            const relNames = node.rel.map(id => {
                const t = nodes.get(id);
                return t ? `<li><strong>Q${id}</strong> — ${t.emoji} ${t.text}</li>` : '';
            }).join('');
            modal.innerHTML = `
                <button class="close-x" onclick="closeModal()">×</button>
                <div class="emoji">${node.emoji}</div>
                <h2>${node.text}</h2>
                <div class="cat-badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.name}</div>
                <div class="mem">${node.memory}</div>
                <div style="font-size:0.85em;color:var(--text-secondary);margin-bottom:8px;"><strong>Related cards:</strong></div>
                <ul class="rel-list">${relNames || '<li style="color:var(--text-muted)">No direct relationships</li>'}</ul>
                <div class="actions">
                    <a href="../index.html?card=${node.id}" target="_blank" rel="noopener noreferrer">🎓 Open in App</a>
                    <a href="markdown_renderer.html?url=https://claudecertstore.blob.core.windows.net/memory-cards/MEM-Q${String(node.id).padStart(3,'0')}.md&title=Memory Card ${String(node.id).padStart(3,'0')}" target="_blank" rel="noopener noreferrer">📝 Memory Notes</a>
                    <a href="https://github.com/rifaterdemsahin/claude_certification_exam/blob/main/formula/exam/CAT0${node.cat}-Q${String(node.id).padStart(3,'0')}.md" target="_blank" rel="noopener noreferrer">📋 Exam Notes</a>
                    <button onclick="closeModal()">Close</button>
                </div>
            `;
            overlay.classList.add('active');
        }
        function closeModal() { overlay.classList.remove('active'); }
        window.closeModal = closeModal;
        window.zoomBy = zoomBy;
        window.resetView = resetView;

        // Init
        resize();
        resetView();
    </script>
    <script src="nav.js"></script>
</body>
</html>
