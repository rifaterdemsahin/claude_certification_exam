<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Resources</h1>
        <p>Additional learning materials and videos</p>
    </header>

    <div class="container">
        <div id="resources-container"></div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <p>Created by Rifat Erdem Sahin</p>
        <div class="footer-links">
            <a href="../index.html">🏠 Home</a>
            <a href="cards.html">🃏 Cards</a>
            <a href="quiz.html">📝 Quiz</a>
            <a href="exam.html">📋 Exam</a>
            <a href="mastery.html">🎯 Mastery</a>
            <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script>
        function renderResources() {
            const container = document.getElementById('resources-container');

            container.innerHTML = youtubeResources.map(category => `
                <div class="resources-section">
                    <h3>${category.category}</h3>
                    <div class="resource-category">
                        <ul class="resource-list">
                            ${category.videos.map(video => `
                                <li>
                                    <a href="${video.url}" target="_blank" class="resource-link">${video.title}</a>
                                    <span class="resource-desc">${video.desc}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        renderResources();
    </script>
</body>
</html>
