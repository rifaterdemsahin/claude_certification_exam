<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Cards - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Memory Cards</h1>
        <p>Visual memory cards with hints and mnemonics</p>
    </header>

    <div class="container">
        <div class="filter-bar">
            <span>Filter:</span>
            <button class="filter-btn active" onclick="setFilter('all')">All</button>
            <button class="filter-btn" onclick="setFilter('unmastered')">Unmastered</button>
            <button class="filter-btn" onclick="setFilter('mastered')">Mastered</button>
            <button class="filter-btn" onclick="setFilter('favorites')">Favorites</button>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search questions..." oninput="filterCards(this.value)">
                <button class="search-clear" onclick="clearSearch()">×</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="total-count">100</div><div class="stat-label">Total Questions</div></div>
            <div class="stat-card"><div class="stat-number" id="mastered-count">0</div><div class="stat-label">Mastered</div></div>
            <div class="stat-card"><div class="stat-number" id="completion-pct">0%</div><div class="stat-label">Completion</div></div>
            <div class="stat-card"><div class="stat-number" id="remaining-count">100</div><div class="stat-label">Remaining</div></div>
        </div>

        <div id="cards-container" class="card-grid"></div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="exam.html">Exam</a>
            <a href="mastery.html">Mastery</a>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Card rendering logic
        function renderCards() {
            const container = document.getElementById('cards-container');
            let filteredQuestions = questionsData;

            // Apply filter
            if (state.filter === 'mastered') {
                filteredQuestions = questionsData.filter(q => state.progress[q.id]);
            } else if (state.filter === 'unmastered') {
                filteredQuestions = questionsData.filter(q => !state.progress[q.id]);
            } else if (state.filter === 'favorites') {
                filteredQuestions = questionsData.filter(q => state.favorites.includes(q.id));
            }

            // Apply search
            if (state.searchQuery) {
                const query = state.searchQuery.toLowerCase();
                filteredQuestions = filteredQuestions.filter(q =>
                    q.question.toLowerCase().includes(query) ||
                    q.answer.toLowerCase().includes(query) ||
                    q.concepts.some(c => c.toLowerCase().includes(query))
                );
            }

            container.innerHTML = filteredQuestions.map(q => {
                const hint = questionHints[q.id];
                const isMastered = state.progress[q.id];
                const isFavorite = state.favorites.includes(q.id);

                return `
                    <div class="flip-card" onclick="this.classList.toggle('flipped')" data-id="${q.id}">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="card-number">${q.uid}</div>
                                <div class="card-category cat-${q.category}">${categories[q.category].name}</div>
                                <button class="fav-btn ${isFavorite ? 'fav-active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${q.id})">
                                    ${isFavorite ? '★' : '☆'}
                                </button>
                                <div class="card-question">${escapeHtml(q.question)}</div>
                                <button class="hint-btn" onclick="event.stopPropagation(); showHint(${q.id})">Hint</button>
                                <button class="claude-btn card-claude-btn" onclick="event.stopPropagation(); askClaude(${q.id})">Ask Claude</button>
                            </div>
                            <div class="flip-card-back">
                                <div class="card-number">${q.uid}</div>
                                <div class="card-answer">${escapeHtml(q.answer)}</div>
                                ${hint ? `
                                    <div class="memory-aid">
                                        <div class="emoji">${hint.emoji}</div>
                                        <div class="text">${escapeHtml(hint.memory)}</div>
                                    </div>
                                ` : ''}
                                <button class="mastery-btn ${isMastered ? 'mastered' : ''}" onclick="event.stopPropagation(); toggleMastery(${q.id})">
                                    ${isMastered ? '✓ Mastered' : 'Mark as Mastered'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        function updateStats() {
            const totalMastered = Object.keys(state.progress).length;
            const total = questionsData.length;
            const percentage = Math.round((totalMastered / total) * 100);

            document.getElementById('total-count').textContent = total;
            document.getElementById('mastered-count').textContent = totalMastered;
            document.getElementById('completion-pct').textContent = percentage + '%';
            document.getElementById('remaining-count').textContent = total - totalMastered;
        }

        function setFilter(filter) {
            state.filter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === filter);
            });
            renderCards();
        }

        function filterCards(query) {
            state.searchQuery = query;
            const clearBtn = document.querySelector('.search-clear');
            clearBtn.classList.toggle('visible', query.length > 0);
            renderCards();
        }

        function clearSearch() {
            document.querySelector('.search-input').value = '';
            state.searchQuery = '';
            document.querySelector('.search-clear').classList.remove('visible');
            renderCards();
        }

        function toggleFavorite(id) {
            const index = state.favorites.indexOf(id);
            if (index === -1) {
                state.favorites.push(id);
            } else {
                state.favorites.splice(index, 1);
            }
            setCookie('claude_cert_favorites', JSON.stringify(state.favorites), 365);
            renderCards();
        }

        function toggleMastery(id) {
            if (state.progress[id]) {
                delete state.progress[id];
            } else {
                state.progress[id] = true;
                showMasteredReward();
            }
            saveProgress(state.progress);
            renderCards();
        }

        function showHint(id) {
            const hint = questionHints[id];
            const q = questionsData.find(q => q.id === id);
            if (!hint || !q) return;

            const overlay = document.createElement('div');
            overlay.className = 'hint-overlay';
            overlay.innerHTML = `
                <div class="hint-popup">
                    <div class="emoji">${hint.emoji}</div>
                    <h3>${escapeHtml(q.question)}</h3>
                    <div class="hint-text">${escapeHtml(hint.text)}</div>
                    <div class="memory">${escapeHtml(hint.memory)}</div>
                    <button class="close-btn" onclick="this.closest('.hint-overlay').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function askClaude(id) {
            const q = questionsData.find(q => q.id === id);
            if (q && q.claudePrompt) {
                window.open(`https://claude.ai/new?q=${encodeURIComponent(q.claudePrompt)}`, '_blank');
            }
        }

        function showMasteredReward() {
            const reward = document.createElement('div');
            reward.className = 'mastered-reward';
            reward.innerHTML = `
                <div class="mastered-reward-inner">
                    <div class="emoji">🎉</div>
                    <div>Question Mastered!</div>
                </div>
            `;
            document.body.appendChild(reward);
            setTimeout(() => reward.remove(), 1200);
        }

        // Initialize
        renderCards();
    </script>
</body>
</html>
