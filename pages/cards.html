<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Cards - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* Card Modal Styles */
        .card-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .card-modal {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-blue);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .card-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .card-modal-close:hover { color: var(--accent-red); background: rgba(239,68,68,0.1); }
        .card-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-modal-id {
            font-size: 0.9em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .card-modal-category {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .card-modal-question {
            font-size: 1.3em;
            line-height: 1.5;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        .card-modal-answer {
            font-size: 1.1em;
            line-height: 1.6;
            color: var(--accent-green);
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(16,185,129,0.1);
            border-radius: 12px;
            border-left: 4px solid var(--accent-green);
        }
        .card-modal-hint {
            padding: 16px;
            background: rgba(56,189,248,0.1);
            border-radius: 12px;
            border: 1px solid var(--accent-blue);
            margin-bottom: 20px;
            text-align: center;
        }
        .card-modal-hint .emoji { font-size: 2em; margin-bottom: 8px; }
        .card-modal-hint .text { color: var(--accent-yellow); font-style: italic; }
        .card-modal-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .card-modal-actions button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .card-modal-actions button:hover { border-color: var(--accent-blue); }
        .card-modal-actions .fav-active {
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            background: rgba(251,191,36,0.1);
        }
        .card-modal-actions .mastered-active {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: rgba(16,185,129,0.1);
        }
        .card-modal-image {
            margin-bottom: 20px;
            text-align: center;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        .card-modal-image img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: contain;
        }
        .card-modal-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .card-link-btn {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--accent-blue);
            text-decoration: none;
            text-align: center;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .card-link-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.1);
        }
        @media (max-width: 640px) {
            .card-modal { padding: 20px; margin: 10px; }
            .card-modal-question { font-size: 1.1em; }
            .card-modal-answer { font-size: 1em; }
            .card-modal-actions { flex-direction: column; }
            .card-modal-actions button { width: 100%; }
            .card-modal-links { flex-direction: column; }
            .card-link-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Memory Cards</h1>
        <p>Visual memory cards with hints and mnemonics</p>
    </header>

    <div class="container">
        <div class="filter-bar">
            <span>Filter:</span>
            <button class="filter-btn active" onclick="setFilter('all')">All</button>
            <button class="filter-btn" onclick="setFilter('unmastered')">Unmastered</button>
            <button class="filter-btn" onclick="setFilter('mastered')">Mastered</button>
            <button class="filter-btn" onclick="setFilter('favorites')">Favorites</button>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search questions..." oninput="filterCards(this.value)">
                <button class="search-clear" onclick="clearSearch()">×</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="total-count">100</div><div class="stat-label">Total Questions</div></div>
            <div class="stat-card"><div class="stat-number" id="mastered-count">0</div><div class="stat-label">Mastered</div></div>
            <div class="stat-card"><div class="stat-number" id="completion-pct">0%</div><div class="stat-label">Completion</div></div>
            <div class="stat-card"><div class="stat-number" id="remaining-count">100</div><div class="stat-label">Remaining</div></div>
        </div>

        <div id="cards-container" class="card-grid"></div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Card rendering logic
        function renderCards() {
            const container = document.getElementById('cards-container');
            let filteredQuestions = questionsData;

            // Apply filter
            if (state.filter === 'mastered') {
                filteredQuestions = questionsData.filter(q => state.progress[q.id]);
            } else if (state.filter === 'unmastered') {
                filteredQuestions = questionsData.filter(q => !state.progress[q.id]);
            } else if (state.filter === 'favorites') {
                filteredQuestions = questionsData.filter(q => state.favorites.includes(q.id));
            }

            // Apply search
            if (state.searchQuery) {
                const query = state.searchQuery.toLowerCase();
                filteredQuestions = filteredQuestions.filter(q =>
                    q.question.toLowerCase().includes(query) ||
                    q.answer.toLowerCase().includes(query) ||
                    q.concepts.some(c => c.toLowerCase().includes(query))
                );
            }

            container.innerHTML = filteredQuestions.map(q => {
                const hint = questionHints[q.id];
                const isMastered = state.progress[q.id];
                const isFavorite = state.favorites.includes(q.id);

                return `
                    <div class="flip-card" onclick="openCardModal(${q.id})" data-id="${q.id}">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <div class="card-number">${q.uid}</div>
                                <div class="card-category cat-${q.category}">${categories[q.category].name}</div>
                                <button class="fav-btn ${isFavorite ? 'fav-active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${q.id})">
                                    ${isFavorite ? '★' : '☆'}
                                </button>
                                <div class="card-question">${escapeHtml(q.question)}</div>
                                <button class="hint-btn" onclick="event.stopPropagation(); showHint(${q.id})">Hint</button>
                            </div>
                            <div class="flip-card-back">
                                <div class="card-number">${q.uid}</div>
                                <div class="card-answer">${escapeHtml(q.answer)}</div>
                                ${hint ? `
                                    <div class="memory-aid">
                                        <div class="emoji">${hint.emoji}</div>
                                        <div class="text">${escapeHtml(hint.memory)}</div>
                                    </div>
                                ` : ''}
                                <button class="mastery-btn ${isMastered ? 'mastered' : ''}" onclick="event.stopPropagation(); toggleMastery(${q.id})">
                                    ${isMastered ? '✓ Mastered' : 'Mark as Mastered'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats();
        }

        // Open card in modal
        function openCardModal(id) {
            const q = questionsData.find(q => q.id === id);
            if (!q) return;

            const hint = questionHints[q.id];
            const isMastered = state.progress[q.id];
            const isFavorite = state.favorites.includes(q.id);

            const overlay = document.createElement('div');
            overlay.className = 'card-modal-overlay';
            overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
                <div class="card-modal">
                    <button class="card-modal-close" onclick="this.closest('.card-modal-overlay').remove()">✕</button>
                    <div class="card-modal-header">
                        <span class="card-modal-id">${q.uid}</span>
                        <span class="card-modal-category cat-${q.category}">${categories[q.category].name}</span>
                    </div>
                    <div class="card-modal-image">
                        <img src="${q.imageUrl}" alt="${escapeHtml(q.question)}" onerror="this.style.display='none'" loading="lazy">
                    </div>
                    <div class="card-modal-question">${escapeHtml(q.question)}</div>
                    <div class="card-modal-answer">${escapeHtml(q.answer)}</div>
                    ${hint ? `
                        <div class="card-modal-hint">
                            <div class="emoji">${hint.emoji}</div>
                            <div class="text">${escapeHtml(hint.memory)}</div>
                        </div>
                    ` : ''}
                    <div class="card-modal-actions">
                        <button class="${isFavorite ? 'fav-active' : ''}" onclick="toggleFavorite(${q.id}); this.closest('.card-modal-overlay').remove(); openCardModal(${q.id});">
                            ${isFavorite ? '★ Favorited' : '☆ Favorite'}
                        </button>
                        <button class="${isMastered ? 'mastered-active' : ''}" onclick="toggleMastery(${q.id}); this.closest('.card-modal-overlay').remove(); const nextId = getNextUnmasteredId(${q.id}); if(nextId) openCardModal(nextId);">
                            ${isMastered ? '✓ Mastered' : 'Mark Mastered'}
                        </button>
                        ${q.claudePrompt ? `<button onclick="window.open('https://claude.ai/new?q=${encodeURIComponent(q.claudePrompt)}', '_blank')">Ask Claude</button>` : ''}
                        <button onclick="this.closest('.card-modal-overlay').remove()">Close</button>
                    </div>
                    <div class="card-modal-links">
                        <a href="${q.googleImageUrl}" target="_blank" class="card-link-btn">🔍 Google Images</a>
                        <a href="${q.relatedVideoUrl}" target="_blank" class="card-link-btn">🎬 YouTube Videos</a>
                        <a href="markdown_renderer.html?url=${encodeURIComponent(q.notesUrl)}&title=${encodeURIComponent(q.uid)}" class="card-link-btn">📝 Notes</a>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);
        }

        function updateStats() {
            const totalMastered = Object.keys(state.progress).length;
            const total = questionsData.length;
            const percentage = Math.round((totalMastered / total) * 100);

            document.getElementById('total-count').textContent = total;
            document.getElementById('mastered-count').textContent = totalMastered;
            document.getElementById('completion-pct').textContent = percentage + '%';
            document.getElementById('remaining-count').textContent = total - totalMastered;
        }

        function setFilter(filter) {
            state.filter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === filter);
            });
            renderCards();
        }

        function filterCards(query) {
            state.searchQuery = query;
            const clearBtn = document.querySelector('.search-clear');
            clearBtn.classList.toggle('visible', query.length > 0);
            renderCards();
        }

        function clearSearch() {
            document.querySelector('.search-input').value = '';
            state.searchQuery = '';
            document.querySelector('.search-clear').classList.remove('visible');
            renderCards();
        }

        function toggleFavorite(id) {
            const index = state.favorites.indexOf(id);
            if (index === -1) {
                state.favorites.push(id);
            } else {
                state.favorites.splice(index, 1);
            }
            setCookie('claude_cert_favorites', JSON.stringify(state.favorites), 365);
            renderCards();
        }

        function toggleMastery(id) {
            if (state.progress[id]) {
                delete state.progress[id];
            } else {
                state.progress[id] = true;
                showMasteredReward();
            }
            saveProgress(state.progress);
            renderCards();
        }

        function getNextUnmasteredId(currentId) {
            const currentIndex = questionsData.findIndex(q => q.id === currentId);
            if (currentIndex === -1) return null;

            // Look for next unmastered card starting from current position
            for (let i = 1; i < questionsData.length; i++) {
                const nextIndex = (currentIndex + i) % questionsData.length;
                if (!state.progress[questionsData[nextIndex].id]) {
                    return questionsData[nextIndex].id;
                }
            }
            return null; // All mastered
        }

        function showHint(id) {
            const hint = questionHints[id];
            const q = questionsData.find(q => q.id === id);
            if (!hint || !q) return;

            const overlay = document.createElement('div');
            overlay.className = 'hint-overlay';
            overlay.innerHTML = `
                <div class="hint-popup">
                    <div class="emoji">${hint.emoji}</div>
                    <h3>${escapeHtml(q.question)}</h3>
                    <div class="hint-text">${escapeHtml(hint.text)}</div>
                    <div class="memory">${escapeHtml(hint.memory)}</div>
                    <button class="close-btn" onclick="this.closest('.hint-overlay').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function askClaude(id) {
            const q = questionsData.find(q => q.id === id);
            if (q && q.claudePrompt) {
                window.open(`https://claude.ai/new?q=${encodeURIComponent(q.claudePrompt)}`, '_blank');
            }
        }

        function showMasteredReward() {
            const reward = document.createElement('div');
            reward.className = 'mastered-reward';
            reward.innerHTML = `
                <div class="mastered-reward-inner">
                    <div class="emoji">🎉</div>
                    <div>Question Mastered!</div>
                </div>
            `;
            document.body.appendChild(reward);
            setTimeout(() => reward.remove(), 1200);
        }

        // Initialize
        renderCards();
    </script>
</body>
</html>
