<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse all 100 memory cards for Claude Developer Certification exam prep.">
    <title>Memory Cards Index — Claude Dev Cert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --border: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --accent-yellow: #fbbf24;
            --accent-red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        header {
            text-align: center;
            padding: 32px 16px;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: var(--text-secondary); margin-top: 8px; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-decoration: none;
            transition: all 0.2s;
            display: block;
        }
        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15);
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .card-id {
            font-family: monospace;
            font-size: 0.85em;
            color: var(--accent-blue);
            font-weight: 600;
        }
        .card-category {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 500;
        }
        .card-question {
            color: var(--text-primary);
            font-size: 0.95em;
            line-height: 1.4;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .card-search-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .card-search-link {
            font-size: 0.75em;
            color: var(--text-muted);
            text-decoration: none;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .card-search-link:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <div class="container">
        <header>
            <h1>🧠 Memory Cards Index</h1>
            <p id="subtitle">Loading memory cards from Azure...</p>
        </header>
        <div class="card-grid" id="cardGrid">
            <div class="loading">
                <div class="spinner"></div>
                <div>Loading cards...</div>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = 'https://claude-cert-api.azurewebsites.net/api';
        const BLOB_BASE = 'https://claudecertstore.blob.core.windows.net';

        const categoryColors = {
            1: '#ef4444', 2: '#3b82f6', 3: '#10b981', 4: '#f59e0b', 5: '#a855f7'
        };
        const categoryNames = {
            1: 'Agentic Architecture', 2: 'Tool Design & MCP', 3: 'Claude Code',
            4: 'Prompt Engineering', 5: 'Context & Reliability'
        };

        async function loadCards() {
            const grid = document.getElementById('cardGrid');
            const subtitle = document.getElementById('subtitle');

            try {
                const resp = await fetch(`${API_BASE}/cards`);
                const data = await resp.json();
                const files = (data.files || [])
                    .filter(f => f.match(/MEM-Q\d+\.md/))
                    .sort();

                subtitle.textContent = `${files.length} memory cards stored in Azure Blob Storage`;

                grid.innerHTML = '';

                for (const file of files) {
                    const id = file.replace('.md', '');
                    const num = parseInt(id.replace('MEM-Q', ''));
                    const cat = num <= 27 ? 1 : num <= 45 ? 2 : num <= 65 ? 3 : num <= 85 ? 4 : 5;
                    const color = categoryColors[cat];
                    const catName = categoryNames[cat];

                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `markdown_renderer.html?url=${encodeURIComponent(`${BLOB_BASE}/memory-cards/${file}`)}&title=Memory Card ${String(num).padStart(3, '0')}`;
                    card.innerHTML = `
                        <div class="card-meta">
                            <span class="card-id">${id}</span>
                            <span class="card-category" style="background: ${color}22; color: ${color}">${catName}</span>
                        </div>
                        <div class="card-question">Memory Card ${String(num).padStart(3, '0')}</div>
                    `;
                    grid.appendChild(card);
                }
            } catch (e) {
                grid.innerHTML = `<div style="color:var(--accent-red);text-align:center;padding:40px;">Failed to load cards: ${e.message}</div>`;
                subtitle.textContent = 'Error loading cards';
            }
        }

        loadCards();
    </script>
</body>
</html>
