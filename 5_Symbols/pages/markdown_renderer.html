<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Markdown viewer for Claude Developer Certification study notes. Browse and read memory cards, concepts, and exam questions.">
    <title>Markdown Notes — Claude Dev Cert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --border: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --accent-yellow: #fbbf24;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        header {
            text-align: center;
            padding: 24px 16px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: clamp(1.2rem, 3vw, 2rem);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        header p { color: var(--text-secondary); font-size: 0.9em; margin-top: 6px; }
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 100px);
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            height: calc(100vh - 100px);
            position: sticky;
            top: 0;
        }
        .sidebar h3 {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 16px 0 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar h3:first-child { margin-top: 0; }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
            color: var(--text-secondary);
        }
        .sidebar-item:hover {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
        }
        .sidebar-item.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-blue);
            font-weight: 500;
        }
        .sidebar-item .icon { font-size: 1.1em; }
        .content-area {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
            height: calc(100vh - 100px);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.9em;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        .back-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .markdown-body {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            font-size: 1em;
            line-height: 1.7;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            margin-top: 28px;
            margin-bottom: 12px;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .markdown-body h1 { font-size: 1.8em; }
        .markdown-body h2 { font-size: 1.5em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body p { margin-bottom: 16px; color: var(--text-primary); }
        .markdown-body ul, .markdown-body ol { margin-bottom: 16px; padding-left: 24px; color: var(--text-secondary); }
        .markdown-body li { margin-bottom: 6px; }
        .markdown-body a { color: var(--accent-blue); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body code {
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.9em;
            color: var(--accent-yellow);
        }
        .markdown-body pre {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: var(--text-primary);
        }
        .markdown-body blockquote {
            border-left: 4px solid var(--accent-purple);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .markdown-body img { max-width: 100%; border-radius: 8px; }
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background: var(--bg-primary);
            color: var(--accent-blue);
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .empty-state .emoji { font-size: 3em; margin-bottom: 16px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header>
        <h1>📝 Markdown Notes</h1>
        <p>Browse and read study materials locally</p>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>📋 Delivery Stages</h3>
            <div class="sidebar-category" data-category="stages"></div>

            <h3>🧠 Memory Cards</h3>
            <div class="sidebar-category" data-category="memory"></div>

            <h3>📚 Concepts</h3>
            <div class="sidebar-category" data-category="concepts"></div>

            <h3>📝 Exam Questions</h3>
            <div class="sidebar-category" data-category="exam"></div>

            <h3>🤖 Agent Files</h3>
            <div class="sidebar-category" data-category="agents"></div>
        </aside>

        <main class="content-area">
            <div id="content" class="empty-state">
                <div class="emoji">📄</div>
                <h2>Select a Note to Read</h2>
                <p style="margin-top:8px">Choose a memory card, concept, or exam question from the sidebar to get started.</p>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'https://claude-cert-api.azurewebsites.net/api';
        const BLOB_BASE = 'https://claudecertstore.blob.core.windows.net';

        // File structure mapping - memory cards will be loaded dynamically
        const notes = {
            stages: [
                { id: 'stage1', title: '1. Real Unknown', file: '../../1_Real_Unknown/README.md' },
                { id: 'problem_statement', title: '   └─ Problem Statement', file: '../../1_Real_Unknown/problem_statement.md' },
                { id: 'okrs', title: '   └─ Objectives & KRs', file: '../../1_Real_Unknown/okrs.md' },
                { id: 'questions', title: '   └─ Open Questions', file: '../../1_Real_Unknown/questions.md' },
                { id: 'hypotheses', title: '   └─ Hypotheses', file: '../../1_Real_Unknown/hypotheses.md' },
                { id: 'stage2', title: '2. Environment', file: '../../2_Environment/README.md' },
                { id: 'azure_env', title: '   └─ Azure Integration', file: '../../2_Environment/azure.md' },
                { id: 'cf_workers', title: '   └─ Cloudflare Workers', file: '../../2_Environment/cloudflare_workers.md' },
                { id: 'fly_io_env', title: '   └─ Fly.io Backend', file: '../../2_Environment/fly_io.md' },
                { id: 'gh_pages_env', title: '   └─ GitHub Pages', file: '../../2_Environment/github_pages.md' },
                { id: 'nav_env', title: '   └─ Navigation Menus', file: '../../2_Environment/navigation.md' },
                { id: 'bookmarks_env', title: '   └─ Bookmarks & Links', file: '../../2_Environment/bookmarks.md' },
                { id: 'stage3', title: '3. Simulation', file: '../../3_Simulation/README.md' },
                { id: 'user_experience', title: '   └─ User Experience Guide', file: '../../3_Simulation/user_experience.md' },
                { id: 'stage4', title: '4. Formula', file: '../../4_Formula/README.md' },
                { id: 'stage5', title: '5. Symbols', file: '../../5_Symbols/README.md' },
                { id: 'stage6', title: '6. Semblance', file: '../../6_Semblance/README.md' },
                { id: 'stage7', title: '7. Testing Known', file: '../../7_Testing_Known/README.md' }
            ],
            memory: [],
            concepts: [
                { id: 'agentic-ai', title: 'Agentic AI', file: '../../4_Formula/concepts/agentic-ai.md' },
                { id: 'agentic-loop', title: 'Agentic Loop', file: '../../4_Formula/concepts/agentic-loop.md' },
                { id: '10-tips-save-tokens', title: '10 Tips to Save Tokens', file: '../../4_Formula/concepts/10-tips-save-tokens.md' },
                { id: 'chain-of-thought', title: 'Chain of Thought', file: '../../4_Formula/concepts/chain-of-thought.md' },
                { id: 'claude-code', title: 'Claude Code', file: '../../4_Formula/concepts/claude-code.md' },
                { id: 'llm-context-size', title: 'LLM Context Size', file: '../../4_Formula/concepts/llm-context-size.md' },
                { id: 'mcp', title: 'MCP (Model Context Protocol)', file: '../../4_Formula/concepts/mcp.md' },
                { id: 'mcp-before-after', title: 'MCP Before/After', file: '../../4_Formula/concepts/mcp-before-after.md' },
                { id: 'prompt-engineering', title: 'Prompt Engineering', file: '../../4_Formula/concepts/prompt-engineering.md' },
                { id: 'reliability', title: 'Reliability', file: '../../4_Formula/concepts/reliability.md' },
                { id: 'validation-loops', title: 'Validation Loops', file: '../../4_Formula/concepts/validation-loops.md' },
                { id: 'skills-location', title: 'Skills Location', file: '../../4_Formula/concepts/skills-location.md' },
                { id: 'coordinator-subagent', title: 'Coordinator-Subagent', file: '../../4_Formula/concepts/coordinator-subagent.md' },
                { id: 'long-term-memory', title: 'Long-Term Memory', file: '../../4_Formula/concepts/long-term-memory.md' },
                { id: 'llm-evolution', title: 'LLM Evolution', file: '../../4_Formula/concepts/llm-evolution.md' },
            ],
            exam: [
                { id: 'CAT01-Q001', title: 'Q001 - Agentic Architecture', file: '../../4_Formula/exam/CAT01-Q001.md' },
                { id: 'CAT01-Q002', title: 'Q002 - Tool Design', file: '../../4_Formula/exam/CAT01-Q002.md' },
                { id: 'CAT01-Q003', title: 'Q003 - Claude Code', file: '../../4_Formula/exam/CAT01-Q003.md' },
                { id: 'CAT01-Q004', title: 'Q004 - Prompt Engineering', file: '../../4_Formula/exam/CAT01-Q004.md' },
                { id: 'CAT01-Q005', title: 'Q005 - Context Management', file: '../../4_Formula/exam/CAT01-Q005.md' },
            ],
            agents: [
                { id: 'agents.md', title: 'Agents Rules', file: '../../agents.md' },
                { id: 'claude.md', title: 'Claude AI Rules', file: '../../claude.md' },
                { id: 'gemini.md', title: 'Gemini AI Rules', file: '../../gemini.md' },
                { id: 'copilot.md', title: 'Copilot Rules', file: '../../copilot.md' },
                { id: 'kilocode.md', title: 'Kilo Code Rules', file: '../../kilocode.md' },
                { id: 'antigravity.md', title: 'Antigravity Rules', file: '../../antigravity.md' },
                { id: 'mimo.md', title: 'Mimo Rules', file: '../../mimo.md' },
            ]
        };

        // Render sidebar
        function renderSidebar() {
            Object.keys(notes).forEach(category => {
                const container = document.querySelector(`.sidebar-category[data-category="${category}"]`);
                const categoryNotes = notes[category];
                
                categoryNotes.forEach(note => {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.file = note.file;
                    item.dataset.id = note.id;
                    item.innerHTML = `<span class="icon">•</span> ${note.title}`;
                    item.addEventListener('click', () => loadNote(note.file, note.title));
                    container.appendChild(item);
                });
            });
        }

        // Load markdown note
        async function loadNote(filePath, title) {
            const content = document.getElementById('content');
            content.className = 'loading';
            content.textContent = 'Loading...';

            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const html = marked.parse(text);
                content.className = 'markdown-body';
                content.innerHTML = html;

                // Add edit/delete buttons for memory cards from Azure
                if (filePath.includes('claudecertstore.blob.core.windows.net/memory-cards/')) {
                    const filename = filePath.split('/').pop();
                    const actionBar = document.createElement('div');
                    actionBar.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;padding:12px;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border);';
                    actionBar.innerHTML = `
                        <button onclick="editCard('${filename}')" style="padding:8px 16px;border:1px solid var(--accent-blue);border-radius:6px;background:transparent;color:var(--accent-blue);cursor:pointer;font-family:inherit;">Edit</button>
                        <button onclick="deleteCard('${filename}')" style="padding:8px 16px;border:1px solid var(--accent-red);border-radius:6px;background:transparent;color:var(--accent-red);cursor:pointer;font-family:inherit;">Delete</button>
                    `;
                    content.insertBefore(actionBar, content.firstChild);
                }

                // Add check off checkbox for core concepts
                if (filePath.includes('4_Formula/concepts/')) {
                    const conceptId = filePath.split('/').pop().replace('.md', '');
                    const cookieMatch = document.cookie.split(';').find(c => c.trim().startsWith('claude_cert_mastered_concepts='));
                    let checked = [];
                    if (cookieMatch) {
                        try { checked = JSON.parse(decodeURIComponent(cookieMatch.split('=')[1])); } catch(e) {}
                    }
                    const isChecked = checked.includes(conceptId);
                    const actionBar = document.createElement('div');
                    actionBar.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border);';
                    actionBar.innerHTML = `
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--accent-green);font-size:0.9em;font-weight:600;margin:0;">
                            <input type="checkbox" id="concept-check-toggle" ${isChecked ? 'checked' : ''} style="width:18px;height:18px;cursor:pointer;">
                            <span>Mastered Concept (Analyse)</span>
                        </label>
                    `;
                    content.insertBefore(actionBar, content.firstChild);

                    actionBar.querySelector('#concept-check-toggle').addEventListener('change', function(e) {
                        const innerCookieMatch = document.cookie.split(';').find(c => c.trim().startsWith('claude_cert_mastered_concepts='));
                        let currentChecked = [];
                        if (innerCookieMatch) {
                            try { currentChecked = JSON.parse(decodeURIComponent(innerCookieMatch.split('=')[1])); } catch(e) {}
                        }
                        if (e.target.checked) {
                            if (!currentChecked.includes(conceptId)) currentChecked.push(conceptId);
                        } else {
                            currentChecked = currentChecked.filter(c => c !== conceptId);
                        }
                        const expires = new Date();
                        expires.setTime(expires.getTime() + (365 * 24 * 60 * 60 * 1000));
                        document.cookie = 'claude_cert_mastered_concepts=' + encodeURIComponent(JSON.stringify(currentChecked)) + ';expires=' + expires.toUTCString() + ';path=/;SameSite=Strict';
                    });
                }

                // Update active state in sidebar
                document.querySelectorAll('.sidebar-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.file === filePath);
                });
            } catch (e) {
                content.className = 'markdown-body';
                content.innerHTML = `
                    <div style="color:var(--accent-red);text-align:center;padding:40px;">
                        <h3>⚠️ Could not load note</h3>
                        <p style="margin-top:8px">${e.message}</p>
                        <p style="margin-top:12px;color:var(--text-secondary);">${filePath}</p>
                    </div>
                `;
            }
        }

        // Edit memory card
        async function editCard(filename) {
            const content = document.getElementById('content');
            const markdownBody = content.querySelector('.markdown-body');
            if (!markdownBody) return;

            // Get current content
            const response = await fetch(`${BLOB_BASE}/memory-cards/${filename}`);
            const text = await response.text();

            // Replace with editor
            markdownBody.innerHTML = `
                <div style="margin-bottom:16px;">
                    <h3 style="color:var(--accent-blue);margin-bottom:12px;">Editing: ${filename}</h3>
                    <textarea id="editContent" style="width:100%;min-height:400px;padding:12px;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:monospace;font-size:0.95em;resize:vertical;">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <button onclick="saveCard('${filename}')" style="padding:10px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent-green),#059669);color:#fff;font-weight:600;cursor:pointer;font-family:inherit;">Save</button>
                        <button onclick="loadNote('${BLOB_BASE}/memory-cards/${filename}', '${filename}')" style="padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:inherit;">Cancel</button>
                    </div>
                </div>
            `;
        }

        // Admin authentication
        let adminToken = localStorage.getItem('adminToken');
        let tokenExpiry = localStorage.getItem('tokenExpiry');

        // Check if token is expired
        function isTokenValid() {
            if (!adminToken || !tokenExpiry) return false;
            return new Date(tokenExpiry) > new Date();
        }

        // Login function
        async function login() {
            const password = prompt('Enter admin password:');
            if (!password) return false;

            try {
                const resp = await fetch(`${API_BASE}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                const data = await resp.json();
                if (data.ok) {
                    adminToken = data.token;
                    tokenExpiry = data.expiresAt;
                    localStorage.setItem('adminToken', adminToken);
                    localStorage.setItem('tokenExpiry', tokenExpiry);
                    return true;
                } else {
                    alert('Invalid password');
                    return false;
                }
            } catch (e) {
                alert('Login failed: ' + e.message);
                return false;
            }
        }

        // Get auth headers
        function getAuthHeaders() {
            if (!isTokenValid()) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('tokenExpiry');
                adminToken = null;
                return {};
            }
            return { 'Authorization': `Bearer ${adminToken}` };
        }

        // Save memory card
        async function saveCard(filename) {
            const textarea = document.getElementById('editContent');
            if (!textarea) return;

            // Check authentication
            if (!isTokenValid()) {
                const loggedIn = await login();
                if (!loggedIn) return;
            }

            const content = textarea.value;
            try {
                const resp = await fetch(`${API_BASE}/cards`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({ filename, content }),
                });

                const data = await resp.json();
                if (data.ok) {
                    alert('Card saved successfully!');
                    loadNote(`${BLOB_BASE}/memory-cards/${filename}`, filename);
                } else if (resp.status === 401) {
                    // Token expired, try again
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('tokenExpiry');
                    alert('Session expired. Please login again.');
                    saveCard(filename);
                } else {
                    alert('Error saving card: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Failed to save card: ' + e.message);
            }
        }

        // Delete memory card
        async function deleteCard(filename) {
            if (!confirm(`Are you sure you want to delete ${filename}?`)) return;

            // Check authentication
            if (!isTokenValid()) {
                const loggedIn = await login();
                if (!loggedIn) return;
            }

            try {
                const resp = await fetch(`${API_BASE}/cards?filename=${filename}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders(),
                });

                const data = await resp.json();
                if (data.ok) {
                    alert('Card deleted successfully!');
                    // Reload the page
                    window.location.reload();
                } else if (resp.status === 401) {
                    // Token expired, try again
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('tokenExpiry');
                    alert('Session expired. Please login again.');
                    deleteCard(filename);
                } else {
                    alert('Error deleting card: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Failed to delete card: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Load memory cards from Azure API
            try {
                const resp = await fetch(`${API_BASE}/cards`);
                const data = await resp.json();
                const files = data.files || [];
                notes.memory = files
                    .filter(f => f.match(/MEM-Q\d+\.md/))
                    .map(f => {
                        const id = f.replace('.md', '');
                        const num = id.replace('MEM-Q', '');
                        return { id, title: `Q${num}`, file: `${BLOB_BASE}/memory-cards/${f}` };
                    })
                    .sort((a, b) => a.id.localeCompare(b.id));
            } catch (e) {
                console.error('Failed to load memory cards:', e);
            }

            renderSidebar();

            // Handle URL parameters for direct memory card links
            const params = new URLSearchParams(window.location.search);
            const urlParam = params.get('url');
            const titleParam = params.get('title');

            if (urlParam) {
                // Decode the URL and load the note
                const decodedUrl = decodeURIComponent(urlParam);
                loadNote(decodedUrl, titleParam || 'Memory Card');
            }
        });
    </script>
</body>
</html>
