<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Exam - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Memory Card Modal */
        .memory-card-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .memory-card-modal {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-purple);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .memory-card-modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .memory-card-modal-close:hover { color: var(--accent-red); }
        .memory-card-modal h2 {
            color: var(--accent-purple);
            margin-bottom: 16px;
            font-size: 1.3em;
        }
        .memory-card-modal .card-content {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            line-height: 1.7;
        }
        .memory-card-modal .card-content h1,
        .memory-card-modal .card-content h2,
        .memory-card-modal .card-content h3 {
            color: var(--accent-blue);
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .memory-card-modal .card-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 12px 0;
        }
        .memory-card-modal .card-content p {
            margin-bottom: 12px;
        }
        .memory-card-modal .card-content ul,
        .memory-card-modal .card-content ol {
            margin-bottom: 12px;
            padding-left: 24px;
        }
        .memory-card-modal .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .domain-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }
        .domain-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .domain-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        .domain-btn.active {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.15);
            color: var(--accent-blue);
            font-weight: 600;
        }
        .practice-option {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            margin-bottom: 10px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.5;
        }
        .practice-option:hover:not(.disabled) {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.05);
            transform: translateX(4px);
        }
        .practice-option.selected {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.1);
        }
        .practice-option.correct {
            border-color: var(--accent-green) !important;
            background: rgba(16,185,129,0.15) !important;
            animation: correctPulse 0.6s ease-out;
        }
        .practice-option.incorrect {
            border-color: var(--accent-red) !important;
            background: rgba(239,68,68,0.15) !important;
            animation: incorrectShake 0.5s ease-out;
        }
        .practice-option.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .practice-option.disabled.correct {
            opacity: 1;
        }
        @keyframes correctPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { transform: scale(1.01); box-shadow: 0 0 16px 8px rgba(16,185,129,0.15); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .explanation-box {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .domain-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .domain-1 { background: rgba(239,68,68,0.15); color: #ef4444; }
        .domain-2 { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .domain-3 { background: rgba(16,185,129,0.15); color: #10b981; }
        .domain-4 { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .domain-5 { background: rgba(168,85,247,0.15); color: #a855f7; }
        .practice-timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16,185,129,0.1);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: 600;
            color: var(--accent-green);
        }
        .practice-timer.warning {
            background: rgba(245,158,11,0.1);
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }
        .practice-timer.danger {
            background: rgba(239,68,68,0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .practice-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }
        .practice-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 24px;
            border-radius: 12px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }
        .practice-nav button:hover:not(:disabled) {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56,189,248,0.2);
        }
        .practice-nav button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-prev-btn { border-left: 4px solid var(--accent-blue) !important; }
        .nav-next-btn { border-right: 4px solid var(--accent-green) !important; }
        .nav-next-btn:hover:not(:disabled) {
            border-color: var(--accent-green) !important;
            background: rgba(16,185,129,0.1) !important;
            box-shadow: 0 4px 12px rgba(16,185,129,0.2) !important;
        }
        .nav-hint {
            font-size: 0.75em;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .nav-progress {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 1.1em;
        }
        .nav-current {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--accent-blue);
        }
        .nav-separator { color: var(--text-secondary); font-size: 0.9em; }
        .nav-total { color: var(--text-secondary); font-size: 0.9em; }
        .enter-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(56,189,248,0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            font-size: 0.8em;
            color: var(--accent-blue);
            margin-top: 12px;
        }
        .enter-hint kbd {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.9em;
            font-family: inherit;
        }
        .question-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .question-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin: 16px 0;
            color: var(--text-primary);
        }
        .results-domain-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        .domain-stat {
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .domain-stat .pct {
            font-size: 1.8em;
            font-weight: 700;
        }
        .domain-stat .label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .review-item {
            padding: 16px;
            margin-bottom: 12px;
            background: var(--bg-primary);
            border-radius: 8px;
            border-left: 4px solid var(--accent-red);
        }
        .review-item.correct-review {
            border-left-color: var(--accent-green);
        }
        .related-cards {
            margin-top: 12px;
            padding: 12px;
            background: rgba(168,85,247,0.08);
            border-radius: 8px;
            border: 1px solid rgba(168,85,247,0.2);
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Practice Exam</h1>
        <p>All questions from the official exam source</p>
        <div style="display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:12px;">
            <div id="practice-timer" class="practice-timer">00:00</div>
            <button onclick="shufflePractice()" style="padding:8px 16px;border-radius:8px;background:rgba(168,85,247,0.15);color:var(--accent-purple);border:1px solid var(--accent-purple);cursor:pointer;font-family:inherit;">Shuffle & Restart</button>
        </div>
    </header>

    <div class="container">
        <div id="domain-filters" class="domain-filters"></div>
        <div id="practice-content"></div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <p>Created by Rifat Erdem Sahin</p>
        <div class="footer-links">
            <a href="../../index.html">Home</a>
            <a href="cards.html">Cards</a>
            <a href="quiz.html">Quiz</a>
            <a href="practice_exam.html">Practice Exam</a>
            <a href="exam.html">Mock Exam</a>
            <a href="mastery.html">Mastery</a>
            <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
        </div>
    </footer>

    <script>
        const DOMAINS = {
            1: { name: 'Fundamentals of Claude & LLMs', color: '#ef4444', range: [1, 11] },
            2: { name: 'Architecture & Design', color: '#3b82f6', range: [12, 21] },
            3: { name: 'Tools & MCP Integration', color: '#10b981', range: [22, 27] },
            4: { name: 'Implementation & Best Practices', color: '#f59e0b', range: [28, 33] },
            5: { name: 'Security, Monitoring & Optimization', color: '#a855f7', range: [34, 40] }
        };

        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let answers = {};
        let selectedAnswer = null;
        let showExplanation = false;
        let activeDomain = 0; // 0 = all
        let showIncorrectOnly = false; // Filter for incorrect answers
        let startTime = Date.now();
        let elapsedSeconds = 0;
        let timerInterval = null;

        function getDomainForQuestion(q) {
            const id = q.id;
            for (const [d, info] of Object.entries(DOMAINS)) {
                if (id >= info.range[0] && id <= info.range[1]) return parseInt(d);
            }
            return 1;
        }

        function loadCookie() {
            const c = document.cookie.split(';').find(c => c.trim().startsWith('practice_exam='));
            return c ? JSON.parse(c.split('=')[1]) : null;
        }

        function saveCookie() {
            const state = {
                answers, currentIndex, activeDomain, showIncorrectOnly,
                startTime, elapsedSeconds,
                questionOrder: filteredQuestions.map(q => q.id)
            };
            document.cookie = `practice_exam=${JSON.stringify(state)};path=/;max-age=86400`;
        }

        function clearCookie() {
            document.cookie = 'practice_exam=;path=/;max-age=0';
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function updateTimerDisplay() {
            const m = Math.floor(elapsedSeconds / 60);
            const s = elapsedSeconds % 60;
            const display = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            const el = document.getElementById('practice-timer');
            if (el) {
                el.textContent = display;
                el.classList.remove('warning', 'danger');
                if (elapsedSeconds >= 1800) el.classList.add('danger');
                else if (elapsedSeconds >= 900) el.classList.add('warning');
            }
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function renderDomainFilters() {
            const container = document.getElementById('domain-filters');
            const incorrectCount = allQuestions.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer).length;
            let html = `<button class="domain-btn ${!showIncorrectOnly && activeDomain === 0 ? 'active' : ''}" onclick="filterDomain(0)">All (${allQuestions.length})</button>`;
            for (const [d, info] of Object.entries(DOMAINS)) {
                const count = allQuestions.filter(q => getDomainForQuestion(q) === parseInt(d)).length;
                html += `<button class="domain-btn ${!showIncorrectOnly && activeDomain === parseInt(d) ? 'active' : ''}" onclick="filterDomain(${d})" style="${!showIncorrectOnly && activeDomain === parseInt(d) ? `border-color:${info.color};color:${info.color};background:${info.color}15` : ''}">Domain ${d} (${count})</button>`;
            }
            html += `<button class="domain-btn ${showIncorrectOnly ? 'active' : ''}" onclick="toggleIncorrectFilter()" style="${showIncorrectOnly ? 'border-color:var(--accent-red);color:var(--accent-red);background:rgba(239,68,68,0.15)' : ''}">❌ Incorrect (${incorrectCount})</button>`;
            container.innerHTML = html;
        }

        function filterDomain(d) {
            showIncorrectOnly = false;
            activeDomain = d;
            if (d === 0) {
                filteredQuestions = [...allQuestions];
            } else {
                filteredQuestions = allQuestions.filter(q => getDomainForQuestion(q) === d);
            }
            currentIndex = 0;
            selectedAnswer = null;
            showExplanation = false;
            renderDomainFilters();
            renderQuestion();
            saveCookie();
        }

        function toggleIncorrectFilter() {
            showIncorrectOnly = !showIncorrectOnly;
            activeDomain = 0;
            if (showIncorrectOnly) {
                filteredQuestions = allQuestions.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer);
            } else {
                filteredQuestions = [...allQuestions];
            }
            currentIndex = 0;
            selectedAnswer = null;
            showExplanation = false;
            renderDomainFilters();
            renderQuestion();
            saveCookie();
        }

        function getQuestionNumber(q) {
            // Show the original question number from the full set
            const idx = allQuestions.findIndex(aq => aq.id === q.id);
            return idx + 1;
        }

        function renderQuestion() {
            const container = document.getElementById('practice-content');
            const q = filteredQuestions[currentIndex];
            if (!q) {
                container.innerHTML = '<div class="question-card"><p style="text-align:center;color:var(--text-secondary);">No questions available for this filter.</p></div>';
                return;
            }

            const domain = getDomainForQuestion(q);
            const domainInfo = DOMAINS[domain];
            const qNum = getQuestionNumber(q);
            const answeredCount = Object.keys(answers).length;
            const total = filteredQuestions.length;
            const answeredInFilter = filteredQuestions.filter(fq => answers[fq.id] !== undefined).length;

            const optionLetters = ['A', 'B', 'C', 'D'];
            const optionColors = { A: '#ef4444', B: '#3b82f6', C: '#10b981', D: '#f59e0b' };

            let optionsHtml = q.options.map((opt, idx) => {
                const letter = optionLetters[idx];
                const isCorrect = letter === q.answer;
                const isSelected = selectedAnswer === letter;
                let cls = 'practice-option';
                if (showExplanation) {
                    cls += ' disabled';
                    if (isCorrect) cls += ' correct';
                    else if (isSelected && !isCorrect) cls += ' incorrect';
                } else if (isSelected) {
                    cls += ' selected';
                }
                return `<button class="${cls}" onclick="selectAnswer('${letter}')" ${showExplanation ? 'disabled' : ''} style="border-left: 4px solid ${optionColors[letter]}${showExplanation && isCorrect ? '' : showExplanation ? '' : ''}">
                    <strong style="color:${optionColors[letter]};margin-right:8px;">${letter})</strong> ${escapeHtml(opt.substring(3))}
                </button>`;
            }).join('');

            let explanationHtml = '';
            if (showExplanation) {
                const isCorrect = selectedAnswer === q.answer;
                explanationHtml = `
                    <div class="explanation-box">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                            <span style="font-size:1.2em;">${isCorrect ? 'Correct' : 'Incorrect'}</span>
                            <span style="color:${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};font-weight:600;">${isCorrect ? 'Well done!' : `The answer is ${q.answer}`}</span>
                        </div>
                        <p style="color:var(--text-secondary);line-height:1.6;">${escapeHtml(q.explanation)}</p>
                        ${q.relatedCards && q.relatedCards.length > 0 ? `
                            <div class="related-cards">
                                <strong style="color:var(--accent-purple);font-size:0.9em;">Related Memory Cards:</strong>
                                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                                    ${q.relatedCards.map(c => {
                                        const pad = c.toString().padStart(3, '0');
                                        return `<a href="#" onclick="event.preventDefault(); showMemoryCardModal(${c})" style="color:var(--accent-blue);text-decoration:none;padding:4px 10px;background:rgba(56,189,248,0.1);border:1px solid var(--accent-blue);border-radius:6px;font-size:0.85em;cursor:pointer;">MEM-Q${pad}</a>`;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <div style="margin-top:16px;padding:16px;background:var(--bg-primary);border-radius:12px;border:1px solid var(--border);">
                        <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
                            <a href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q.question + ' ' + (q.options.find(opt => opt.startsWith(q.answer + ')')) || q.answer) + ' claude llm')}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(239,68,68,0.1);border:1px solid var(--accent-red);border-radius:8px;color:var(--accent-red);text-decoration:none;font-size:0.9em;font-weight:500;transition:all 0.2s;">
                                Google Images
                            </a>
                            <a href="https://rifaterdemsahin.github.io/claude_certification_exam/pages/practice_exam.html" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(168,85,247,0.1);border:1px solid var(--accent-purple);border-radius:8px;color:var(--accent-purple);text-decoration:none;font-size:0.9em;font-weight:500;transition:all 0.2s;">
                                Read More on Practice Exam
                            </a>
                        </div>
                    </div>

                    <div class="enter-hint">Press <kbd>Enter</kbd> to go to next question</div>
                `;
            }

            container.innerHTML = `
                <div class="question-card fade-in">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                        <span class="domain-badge domain-${domain}">Domain ${domain}: ${domainInfo.name}</span>
                        <span style="color:var(--text-secondary);font-size:0.9em;">Question ${currentIndex + 1} of ${total}</span>
                    </div>

                    <div style="margin:16px 0;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85em;color:var(--text-secondary);">
                            <span>${answeredInFilter} answered</span>
                            <span>${total - answeredInFilter} remaining</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${(answeredInFilter / total) * 100}%"></div>
                        </div>
                    </div>

                    <div class="question-text">${escapeHtml(q.question)}</div>

                    <div>${optionsHtml}</div>
                    ${explanationHtml}

                    <div class="practice-nav">
                        <button onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''} class="nav-prev-btn">
                            Previous
                            ${currentIndex > 0 ? `<span class="nav-hint">Q${currentIndex}</span>` : ''}
                        </button>
                        <div class="nav-progress">
                            <span class="nav-current">${currentIndex + 1}</span>
                            <span class="nav-separator">/</span>
                            <span class="nav-total">${total}</span>
                        </div>
                        <button onclick="nextQuestion()" class="nav-next-btn">
                            ${currentIndex < total - 1 ? 'Next' : 'Finish'}
                            ${currentIndex < total - 1 ? `<span class="nav-hint">Q${currentIndex + 2}</span>` : ''}
                        </button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function selectAnswer(letter) {
            if (showExplanation) return;
            const q = filteredQuestions[currentIndex];
            selectedAnswer = letter;
            answers[q.id] = letter;
            showExplanation = true;
            saveCookie();
            renderQuestion();
        }

        function nextQuestion() {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                const q = filteredQuestions[currentIndex];
                selectedAnswer = answers[q.id] || null;
                showExplanation = selectedAnswer !== null;
                renderQuestion();
                saveCookie();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                const q = filteredQuestions[currentIndex];
                selectedAnswer = answers[q.id] || null;
                showExplanation = selectedAnswer !== null;
                renderQuestion();
                saveCookie();
            }
        }

        function showResults() {
            stopTimer();
            const container = document.getElementById('practice-content');
            const questions = filteredQuestions;
            let correct = 0;
            questions.forEach(q => {
                if (answers[q.id] === q.answer) correct++;
            });
            const pct = Math.round((correct / questions.length) * 100);

            // Domain breakdown
            const domainStats = {};
            for (const [d, info] of Object.entries(DOMAINS)) {
                const domainQs = questions.filter(q => getDomainForQuestion(q) === parseInt(d));
                if (domainQs.length === 0) continue;
                const domainCorrect = domainQs.filter(q => answers[q.id] === q.answer).length;
                domainStats[d] = { correct: domainCorrect, total: domainQs.length, pct: Math.round((domainCorrect / domainQs.length) * 100) };
            }

            const domainBreakdownHtml = Object.entries(domainStats).map(([d, s]) => {
                const info = DOMAINS[d];
                const color = s.pct >= 80 ? 'var(--accent-green)' : s.pct >= 60 ? 'var(--accent-orange)' : 'var(--accent-red)';
                return `<div class="domain-stat">
                    <div class="domain-badge domain-${d}" style="margin-bottom:8px;">Domain ${d}</div>
                    <div class="pct" style="color:${color}">${s.pct}%</div>
                    <div class="label">${s.correct}/${s.total} correct</div>
                </div>`;
            }).join('');

            const reviewHtml = questions.map((q, idx) => {
                const userAnswer = answers[q.id];
                const isCorrect = userAnswer === q.answer;
                const domain = getDomainForQuestion(q);
                return `<div class="review-item ${isCorrect ? 'correct-review' : ''}">
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                        <span style="font-weight:600;">${idx + 1}. ${escapeHtml(q.question)}</span>
                        <span style="color:${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">${isCorrect ? 'Correct' : 'Wrong'}</span>
                    </div>
                    <div style="font-size:0.9em;color:var(--text-secondary);">
                        <div>Your answer: ${userAnswer || 'Not answered'}</div>
                        ${!isCorrect ? `<div>Correct answer: ${q.answer}</div>` : ''}
                    </div>
                    <div style="margin-top:8px;font-size:0.85em;color:var(--text-muted);">${escapeHtml(q.explanation)}</div>
                </div>`;
            }).join('');

            const scoreColor = pct >= 80 ? 'var(--accent-green)' : pct >= 60 ? 'var(--accent-orange)' : 'var(--accent-red)';

            container.innerHTML = `
                <div class="question-card fade-in">
                    <h2 style="text-align:center;margin-bottom:24px;font-size:1.8em;">Practice Exam Complete!</h2>

                    <div style="text-align:center;margin-bottom:24px;">
                        <div style="font-size:3em;font-weight:700;color:${scoreColor};">${pct}%</div>
                        <div style="color:var(--text-secondary);margin-top:4px;">${correct} of ${questions.length} correct</div>
                    </div>

                    <div class="stats-grid" style="margin-bottom:24px;">
                        <div class="stat-card">
                            <div class="stat-number" style="color:var(--accent-green);">${correct}</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" style="color:var(--accent-red);">${questions.length - correct}</div>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${formatTime(elapsedSeconds)}</div>
                            <div class="stat-label">Time Taken</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${questions.length}</div>
                            <div class="stat-label">Total Questions</div>
                        </div>
                    </div>

                    <h3 style="margin-bottom:12px;">Domain Breakdown</h3>
                    <div class="results-domain-breakdown">${domainBreakdownHtml}</div>

                    <h3 style="margin:24px 0 12px;">Review Answers</h3>
                    ${reviewHtml}

                    <div class="practice-nav" style="margin-top:24px;">
                        <button onclick="resetPractice()" class="nav-prev-btn">Retake Exam</button>
                        <a href="../../index.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 24px;border-radius:12px;background:var(--bg-primary);border:2px solid var(--border);color:var(--text-primary);text-decoration:none;font-weight:600;min-width:140px;">Back to Home</a>
                    </div>
                </div>
            `;
        }

        function shufflePractice() {
            clearCookie();
            stopTimer();
            allQuestions = shuffleArray(allQuestions);
            filteredQuestions = activeDomain === 0 ? [...allQuestions] : allQuestions.filter(q => getDomainForQuestion(q) === activeDomain);
            currentIndex = 0;
            selectedAnswer = null;
            showExplanation = false;
            answers = {};
            startTime = Date.now();
            elapsedSeconds = 0;
            saveCookie();
            startTimer();
            updateTimerDisplay();
            renderQuestion();
        }

        function resetPractice() {
            clearCookie();
            stopTimer();
            currentIndex = 0;
            selectedAnswer = null;
            showExplanation = false;
            answers = {};
            startTime = Date.now();
            elapsedSeconds = 0;
            saveCookie();
            startTimer();
            updateTimerDisplay();
            renderQuestion();
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        async function init() {
            try {
                const resp = await fetch('../data/exam.json');
                allQuestions = await resp.json();
            } catch (e) {
                document.getElementById('practice-content').innerHTML = '<div class="question-card"><p style="color:var(--accent-red);">Failed to load exam data. Make sure data/exam.json exists.</p></div>';
                return;
            }

            const saved = loadCookie();
            if (saved && saved.questionOrder && saved.questionOrder.length > 0) {
                // Restore order from cookie
                const orderMap = {};
                saved.questionOrder.forEach((id, idx) => orderMap[id] = idx);
                allQuestions.sort((a, b) => (orderMap[a.id] || 0) - (orderMap[b.id] || 0));
                answers = saved.answers || {};
                activeDomain = saved.activeDomain || 0;
                showIncorrectOnly = saved.showIncorrectOnly || false;
                startTime = saved.startTime || Date.now();
                elapsedSeconds = saved.elapsedSeconds || 0;
                if (showIncorrectOnly) {
                    filteredQuestions = allQuestions.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer);
                } else {
                    filteredQuestions = activeDomain === 0 ? [...allQuestions] : allQuestions.filter(q => getDomainForQuestion(q) === activeDomain);
                }
                currentIndex = Math.min(saved.currentIndex || 0, filteredQuestions.length - 1);
                const q = filteredQuestions[currentIndex];
                selectedAnswer = q ? (answers[q.id] || null) : null;
                showExplanation = selectedAnswer !== null;
            } else {
                filteredQuestions = [...allQuestions];
            }

            renderDomainFilters();
            updateTimerDisplay();
            startTimer();
            renderQuestion();
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && showExplanation) {
                e.preventDefault();
                nextQuestion();
            }
            // Close modal on Escape
            if (e.key === 'Escape') {
                const modal = document.querySelector('.memory-card-modal-overlay');
                if (modal) modal.remove();
            }
        });

        // Show memory card in modal
        async function showMemoryCardModal(cardId) {
            const pad = cardId.toString().padStart(3, '0');
            const url = `https://claudecertstore.blob.core.windows.net/memory-cards/MEM-Q${pad}.md`;

            // Create modal overlay
            const overlay = document.createElement('div');
            overlay.className = 'memory-card-modal-overlay';
            overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
                <div class="memory-card-modal">
                    <button class="memory-card-modal-close" onclick="this.closest('.memory-card-modal-overlay').remove()">✕</button>
                    <h2>Memory Card MEM-Q${pad}</h2>
                    <div class="card-content">
                        <div class="loading-spinner">Loading memory card...</div>
                    </div>
                </div>
            `;

            document.body.appendChild(overlay);

            // Fetch and render the markdown
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const html = marked.parse(text);
                const contentDiv = overlay.querySelector('.card-content');
                contentDiv.innerHTML = html;
            } catch (e) {
                const contentDiv = overlay.querySelector('.card-content');
                contentDiv.innerHTML = `<div style="color:var(--accent-red);text-align:center;padding:20px;">Failed to load memory card: ${e.message}</div>`;
            }
        }

        init();
    </script>
</body>
</html>
