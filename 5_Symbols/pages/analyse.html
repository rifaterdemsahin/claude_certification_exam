<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Stats</h1>
        <p>Review your performance and weak areas</p>
    </header>

    <div class="container">
        <div class="analyse-container">
            <div class="analyse-grid">
                <div class="analyse-card">
                    <h3>📊 Overall Statistics</h3>
                    <div id="overall-stats"></div>
                </div>

                <div class="analyse-card">
                    <h3>📈 Category Breakdown</h3>
                    <div id="category-stats"></div>
                </div>

                <div class="analyse-card">
                    <h3>🎯 Concept Mastery</h3>
                    <div id="concept-stats"></div>
                </div>

                <div class="analyse-card">
                    <h3>📋 Study Recommendations</h3>
                    <div id="recommendations"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <p>Claude Developer Certification Study App</p>
        <p>Created by Rifat Erdem Sahin</p>
        <div class="footer-links">
            <a href="../../index.html">🏠 Home</a>
            <a href="cards.html">🃏 Cards</a>
            <a href="quiz.html">📝 Quiz</a>
            <a href="exam.html">📋 Exam</a>
            <a href="mastery.html">🎯 Mastery</a>
            <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function renderAnalyse() {
            renderOverallStats();
            renderCategoryStats();
            renderConceptStats();
            renderRecommendations();
        }

        function renderOverallStats() {
            const container = document.getElementById('overall-stats');
            const totalMastered = Object.keys(state.progress).length;
            const total = questionsData.length;
            const percentage = Math.round((totalMastered / total) * 100);
            const remaining = total - totalMastered;

            container.innerHTML = `
                <div class="analyse-stat">
                    <span class="label">Total Questions</span>
                    <span class="value">${total}</span>
                </div>
                <div class="analyse-stat">
                    <span class="label">Mastered</span>
                    <span class="value" style="color:var(--accent-green)">${totalMastered}</span>
                </div>
                <div class="analyse-stat">
                    <span class="label">Remaining</span>
                    <span class="value" style="color:var(--accent-orange)">${remaining}</span>
                </div>
                <div class="analyse-stat">
                    <span class="label">Completion</span>
                    <span class="value">${percentage}%</span>
                </div>
                <div style="margin-top:16px;">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${percentage}%"></div>
                    </div>
                </div>
            `;
        }

        function renderCategoryStats() {
            const container = document.getElementById('category-stats');
            const catStats = {};

            questionsData.forEach(q => {
                if (!catStats[q.category]) {
                    catStats[q.category] = { total: 0, mastered: 0 };
                }
                catStats[q.category].total++;
                if (state.progress[q.category]) catStats[q.category].mastered++;
            });

            container.innerHTML = Object.entries(catStats).map(([catId, stats]) => {
                const cat = categories[catId];
                const percentage = Math.round((stats.mastered / stats.total) * 100);
                return `
                    <div class="category-progress">
                        <div class="category-header">
                            <span>${cat.name}</span>
                            <span>${stats.mastered}/${stats.total} (${percentage}%)</span>
                        </div>
                        <div class="category-bar">
                            <div class="category-fill" style="width:${percentage}%;background:${cat.color}"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderConceptStats() {
            const container = document.getElementById('concept-stats');
            const conceptStats = {};

            questionsData.forEach(q => {
                q.concepts.forEach(concept => {
                    if (!conceptStats[concept]) {
                        conceptStats[concept] = { total: 0, mastered: 0 };
                    }
                    conceptStats[concept].total++;
                    if (state.progress[q.id]) conceptStats[concept].mastered++;
                });
            });

            const sortedConcepts = Object.entries(conceptStats)
                .sort((a, b) => (b[1].mastered / b[1].total) - (a[1].mastered / a[1].total));

            container.innerHTML = sortedConcepts.slice(0, 10).map(([concept, stats]) => {
                const percentage = Math.round((stats.mastered / stats.total) * 100);
                const displayName = categorySlugs[concept] || concept;
                return `
                    <div class="analyse-stat">
                        <span class="label">${displayName}</span>
                        <span class="value">${stats.mastered}/${stats.total} (${percentage}%)</span>
                    </div>
                `;
            }).join('');
        }

        function renderRecommendations() {
            const container = document.getElementById('recommendations');
            const recommendations = [];

            // Find weakest categories
            const catStats = {};
            questionsData.forEach(q => {
                if (!catStats[q.category]) catStats[q.category] = { total: 0, mastered: 0 };
                catStats[q.category].total++;
                if (state.progress[q.id]) catStats[q.category].mastered++;
            });

            Object.entries(catStats).forEach(([catId, stats]) => {
                const percentage = (stats.mastered / stats.total) * 100;
                if (percentage < 50) {
                    recommendations.push(`Focus on ${categories[catId].name} (${Math.round(percentage)}% complete)`);
                }
            });

            // Find unmastered questions
            const unmastered = questionsData.filter(q => !state.progress[q.id]);
            if (unmastered.length > 0) {
                recommendations.push(`You have ${unmastered.length} questions remaining`);
            }

            if (recommendations.length === 0) {
                recommendations.push('Great job! You\'ve mastered all questions!');
            }

            container.innerHTML = recommendations.map(rec => `
                <div style="padding:8px 0;border-bottom:1px solid var(--border);">
                    <span style="color:var(--accent-yellow);">💡</span> ${rec}
                </div>
            `).join('');
        }

        // Initialize
        renderAnalyse();
    </script>
</body>
</html>
