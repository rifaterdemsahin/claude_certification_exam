<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Mode - Claude Developer Certification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        .exam-option-a { border-left: 4px solid #ef4444 !important; }
        .exam-option-b { border-left: 4px solid #3b82f6 !important; }
        .exam-option-c { border-left: 4px solid #10b981 !important; }
        .exam-option-d { border-left: 4px solid #f59e0b !important; }
        .exam-option-a:hover { background: rgba(239,68,68,0.1) !important; }
        .exam-option-b:hover { background: rgba(59,130,246,0.1) !important; }
        .exam-option-c:hover { background: rgba(16,185,129,0.1) !important; }
        .exam-option-d:hover { background: rgba(245,158,11,0.1) !important; }
        .exam-timer {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16,185,129,0.1);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: 600;
            color: var(--accent-green);
            margin-top: 12px;
        }
        .exam-timer.warning {
            background: rgba(245,158,11,0.1);
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }
        .exam-timer.danger {
            background: rgba(239,68,68,0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        /* Correct/Incorrect animations */
        @keyframes correctPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px 10px rgba(16,185,129,0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        @keyframes correctConfetti {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .exam-option.correct {
            animation: correctPulse 0.6s ease-out;
            border: 2px solid var(--accent-green) !important;
            background: rgba(16,185,129,0.15) !important;
        }
        .exam-option.incorrect {
            animation: incorrectShake 0.5s ease-out;
            border: 2px solid var(--accent-red) !important;
            background: rgba(239,68,68,0.15) !important;
        }
        .quiz-explanation.correct-enter {
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .enter-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(56,189,248,0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            font-size: 0.8em;
            color: var(--accent-blue);
            margin-top: 12px;
        }
        .enter-hint kbd {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.9em;
            font-family: inherit;
        }
        .exam-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }
        .exam-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 24px;
            border-radius: 12px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }
        .exam-nav button:hover:not(:disabled) {
            border-color: var(--accent-blue);
            background: rgba(56,189,248,0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56,189,248,0.2);
        }
        .exam-nav button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-prev-btn { border-left: 4px solid var(--accent-blue) !important; }
        .nav-next-btn { border-right: 4px solid var(--accent-green) !important; }
        .nav-next-btn:hover:not(:disabled) {
            border-color: var(--accent-green) !important;
            background: rgba(16,185,129,0.1) !important;
            box-shadow: 0 4px 12px rgba(16,185,129,0.2) !important;
        }
        .nav-hint {
            font-size: 0.75em;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .nav-progress {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 1.1em;
        }
        .nav-current {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--accent-blue);
        }
        .nav-separator {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        .nav-total {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <script src="../js/nav.js"></script>
    <header class="app-header">
        <h1>Exam Mode</h1>
        <p>Mock exam with realistic formatting</p>
        <div style="display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:12px;">
            <div id="exam-timer" class="exam-timer">⏱️ 00:00</div>
            <button onclick="shuffleExam()" style="padding:8px 16px;border-radius:8px;background:rgba(168,85,247,0.15);color:var(--accent-purple);border:1px solid var(--accent-purple);cursor:pointer;font-family:inherit;">🔀 Shuffle & Restart</button>
        </div>
    </header>

    <div class="container">
        <div class="exam-container">
            <div id="exam-content"></div>
        </div>
    </div>

     <footer class="app-footer">
         <p>Claude Developer Certification Study App</p>
         <p>Created by Rifat Erdem Sahin</p>
         <div class="footer-links">
             <a href="../../index.html">🏠 Home</a>
             <a href="cards.html">🃏 Cards</a>
             <a href="quiz.html">📝 Quiz</a>
             <a href="practice_exam.html">📝 Practice</a>
             <a href="exam.html">📋 Mock Exam</a>
             <a href="mastery.html">🎯 Mastery</a>
             <a href="incorrect_summary.html">❌ Incorrect</a>
             <a href="https://github.com/rifaterdemsahin/claude_certification_exam" target="_blank">GitHub</a>
         </div>
     </footer>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function getExamCookie() {
            const cookie = document.cookie.split(';').find(c => c.trim().startsWith('exam_state='));
            return cookie ? JSON.parse(cookie.split('=')[1]) : null;
        }

        function saveExamCookie() {
            const examState = {
                examData: state.examData,
                examIndex: state.examIndex,
                examAnswers: state.examAnswers,
                startTime: state.examStartTime || Date.now(),
                elapsedSeconds: state.examElapsedSeconds || 0
            };
            document.cookie = `exam_state=${JSON.stringify(examState)};path=/;max-age=86400`;
        }

        let timerInterval = null;

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimer() {
            const elapsed = state.examElapsedSeconds || 0;
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const display = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            const timerEl = document.getElementById('exam-timer');
            if (timerEl) {
                timerEl.textContent = `⏱️ ${display}`;

                // Add warning/danger classes based on time
                timerEl.classList.remove('warning', 'danger');
                if (elapsed >= 1800) { // 30 minutes
                    timerEl.classList.add('danger');
                } else if (elapsed >= 900) { // 15 minutes
                    timerEl.classList.add('warning');
                }
            }
            state.examElapsedSeconds = (state.examElapsedSeconds || 0) + 1;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function clearExamCookie() {
            document.cookie = 'exam_state=;path=/;max-age=0';
        }

        function initExam() {
            const saved = getExamCookie();
            if (saved && saved.examData && saved.examData.length > 0) {
                state.examData = saved.examData;
                state.examIndex = saved.examIndex || 0;
                state.examAnswers = saved.examAnswers || {};
                state.examSelected = state.examAnswers[state.examData[state.examIndex].id] || null;
                state.examShowExplanation = state.examSelected !== null;
                state.examStartTime = saved.startTime || Date.now();
                state.examElapsedSeconds = saved.elapsedSeconds || 0;
            } else {
                state.examData = shuffleArray([...questionsData]).slice(0, 20);
                state.examIndex = 0;
                state.examSelected = null;
                state.examShowExplanation = false;
                state.examAnswers = {};
                state.examStartTime = Date.now();
                state.examElapsedSeconds = 0;
            }
            updateTimer();
            startTimer();
            renderExam();
        }

        function shuffleExam() {
            clearExamCookie();
            stopTimer();
            state.examData = shuffleArray([...questionsData]).slice(0, 20);
            state.examIndex = 0;
            state.examSelected = null;
            state.examShowExplanation = false;
            state.examAnswers = {};
            state.examStartTime = Date.now();
            state.examElapsedSeconds = 0;
            saveExamCookie();
            startTimer();
            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('exam-content');
            const q = state.examData[state.examIndex];

            if (!q) {
                showExamResults();
                return;
            }

            const options = generateOptionsForQuestion(q);
            const letterEmojis = { 'A': '🅰️', 'B': '🅱️', 'C': '🅲', 'D': '🅳' };
            const answeredCount = Object.keys(state.examAnswers).length;
            const unansweredCount = state.examData.length - answeredCount;

            container.innerHTML = `
                <div class="exam-card fade-in">
                    <div class="quiz-meta">
                        <span class="card-category cat-${q.category}">${categories[q.category].name}</span>
                        <span>Question ${state.examIndex + 1} of ${state.examData.length}</span>
                    </div>

                    <div class="exam-progress-bar">
                        <div class="progress-label">Exam Progress</div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${(answeredCount / state.examData.length) * 100}%"></div>
                        </div>
                        <div class="progress-stats">
                            <span>${answeredCount} answered</span>
                            <span>${unansweredCount} unanswered</span>
                        </div>
                        ${unansweredCount > 0 ? `
                            <div class="unanswered-warning">
                                ⚠️ ${unansweredCount} question${unansweredCount > 1 ? 's' : ''} unanswered
                            </div>
                        ` : ''}
                    </div>

                    <div class="exam-question">${escapeHtml(q.question)}</div>

                    <div class="exam-options">
                        ${options.map((opt, idx) => {
                            const letter = String.fromCharCode(65 + idx);
                            const emoji = letterEmojis[letter] || '';
                            let cls = `exam-option exam-option-${letter.toLowerCase()}`;
                            if (state.examSelected === opt) cls += ' selected';
                            if (state.examShowExplanation) {
                                if (opt === q.answer) cls += ' correct';
                                else if (opt === state.examSelected && opt !== q.answer) cls += ' incorrect';
                            }
                            return `<button class="${cls}" onclick="selectExamAnswer('${escapeHtml(opt)}')">
                                ${emoji} ${escapeHtml(opt)}
                            </button>`;
                        }).join('')}
                    </div>

                    ${state.examShowExplanation ? `
                        <div class="quiz-explanation correct-enter">
                            <strong>${state.examSelected === q.answer ? '✅ Correct!' : '❌ Incorrect'}</strong>
                            <p>${escapeHtml(q.answer)}</p>
                        </div>
                        <div class="enter-hint">
                            Press <kbd>Enter</kbd> to go to next question
                        </div>

                        <div class="exam-rationale" style="margin-top:16px;padding:16px;background:var(--bg-primary);border-radius:12px;border:1px solid var(--border);">
                            <h4 style="color:var(--accent-blue);margin-bottom:12px;">📊 Rationale - Concepts Leading to Answer</h4>
                            <div class="mermaid">
                                graph LR
                                    ${q.concepts && q.concepts.length > 0 ? q.concepts.map((c, i) => {
                                        const safeName = c.replace(/[^a-zA-Z0-9]/g, '_');
                                        return `C${i}["${c}"] --> A`;
                                    }).join('\n                                    ') : 'C0["General Knowledge"] --> A'}
                                    A["${q.answer.substring(0, 60).replace(/["\[\]{}()]/g, '').replace(/\n/g, ' ')}"]
                                    ${q.concepts && q.concepts.length > 0 ? q.concepts.map((c, i) => `style C${i} fill:#1e3a5f,stroke:#38bdf8,color:#e2e8f0`).join('\n                                    ') : ''}
                                    style A fill:#064e3b,stroke:#10b981,color:#e2e8f0
                            </div>
                            <div style="margin-top:12px;padding:12px;background:var(--bg-secondary);border-radius:8px;">
                                <strong style="color:var(--accent-green);">Key Concepts:</strong>
                                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                                    ${q.concepts && q.concepts.length > 0 ? q.concepts.map(c => `<span style="padding:4px 10px;background:rgba(56,189,248,0.1);border:1px solid var(--accent-blue);border-radius:6px;font-size:0.85em;color:var(--accent-blue);">${c}</span>`).join('') : '<span style="color:var(--text-secondary);">No specific concepts listed</span>'}
                                </div>
                            </div>
                        </div>

                        <div class="exam-memory-card" style="margin-top:16px;padding:16px;background:rgba(168,85,247,0.1);border-radius:12px;border:1px solid var(--accent-purple);">
                            <h4 style="color:var(--accent-purple);margin-bottom:8px;">🃏 Related Memory Card</h4>
                            ${(() => {
                                const num = q.id.toString().padStart(3, '0');
                                return `<a href="markdown_renderer.html?url=https://claudecertstore.blob.core.windows.net/memory-cards/MEM-Q${num}.md&title=Memory Card Q${num}" style="color:var(--accent-blue);text-decoration:none;">View Memory Card: MEM-Q${num}</a>`;
                            })()}
                        </div>
                    ` : ''}

                    <div class="exam-nav">
                        <button onclick="prevExamQuestion()" ${state.examIndex === 0 ? 'disabled' : ''} class="nav-prev-btn">
                            ⬅️ Previous
                            ${state.examIndex > 0 ? `<span class="nav-hint">Q${state.examIndex}</span>` : ''}
                        </button>
                        <div class="nav-progress">
                            <span class="nav-current">${state.examIndex + 1}</span>
                            <span class="nav-separator">/</span>
                            <span class="nav-total">${state.examData.length}</span>
                        </div>
                        <button onclick="nextExamQuestion()" class="nav-next-btn">
                            ${state.examIndex < state.examData.length - 1 ? 'Next ➡️' : '🏁 Finish Exam'}
                            ${state.examIndex < state.examData.length - 1 ? `<span class="nav-hint">Q${state.examIndex + 2}</span>` : ''}
                        </button>
                    </div>
                </div>
            `;
        }

        function selectExamAnswer(answer) {
            const q = state.examData[state.examIndex];
            state.examSelected = answer;
            state.examAnswers[q.id] = answer;
            state.examShowExplanation = true;
            saveExamCookie();
            renderExam();
        }

        function nextExamQuestion() {
            if (state.examIndex < state.examData.length - 1) {
                state.examIndex++;
                state.examSelected = state.examAnswers[state.examData[state.examIndex].id] || null;
                state.examShowExplanation = state.examSelected !== null;
                renderExam();
            } else {
                showExamResults();
            }
        }

        function prevExamQuestion() {
            if (state.examIndex > 0) {
                state.examIndex--;
                state.examSelected = state.examAnswers[state.examData[state.examIndex].id] || null;
                state.examShowExplanation = state.examSelected !== null;
                renderExam();
            }
        }

        function showExamResults() {
            stopTimer();
            const container = document.getElementById('exam-content');
            let correct = 0;
            state.examData.forEach(q => {
                if (state.examAnswers[q.id] === q.answer) correct++;
            });

            const percentage = Math.round((correct / state.examData.length) * 100);
            const timeTaken = formatTime(state.examElapsedSeconds || 0);

            container.innerHTML = `
                <div class="exam-card fade-in">
                    <h2 style="text-align:center;margin-bottom:24px;">Exam Complete!</h2>

                    <div class="stats-grid" style="margin-bottom:24px;">
                        <div class="stat-card">
                            <div class="stat-number">${correct}</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${state.examData.length - correct}</div>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${percentage}%</div>
                            <div class="stat-label">Score</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${state.examData.length}</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">⏱️ ${timeTaken}</div>
                            <div class="stat-label">Time Taken</div>
                        </div>
                    </div>

                    <h3 style="margin-bottom:16px;">Review Answers</h3>
                    ${state.examData.map((q, idx) => {
                        const userAnswer = state.examAnswers[q.id];
                        const isCorrect = userAnswer === q.answer;
                        return `
                            <div style="padding:16px;margin-bottom:12px;background:var(--bg-primary);border-radius:8px;border-left:4px solid ${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">
                                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                                    <span style="font-weight:600;">${idx + 1}. ${escapeHtml(q.question)}</span>
                                    <span style="color:${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">${isCorrect ? '✅' : '❌'}</span>
                                </div>
                                <div style="font-size:0.9em;color:var(--text-secondary);">
                                    <div>Your answer: ${escapeHtml(userAnswer || 'Not answered')}</div>
                                    ${!isCorrect ? `<div>Correct answer: ${escapeHtml(q.answer)}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}

                    <div class="exam-nav" style="margin-top:24px;">
                        <button onclick="initExam()" class="nav-prev-btn">🔄 Retake Exam</button>
                        <a href="../../index.html" class="nav-tab" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 24px;border-radius:12px;background:var(--bg-primary);border:2px solid var(--border);color:var(--text-primary);text-decoration:none;font-weight:600;min-width:140px;">🏠 Back to Home</a>
                    </div>
                </div>
            `;
        }

        // Initialize mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            themeVariables: {
                primaryColor: '#1e3a5f',
                primaryTextColor: '#e2e8f0',
                primaryBorderColor: '#38bdf8',
                lineColor: '#38bdf8',
                secondaryColor: '#064e3b',
                tertiaryColor: '#1e293b',
                fontSize: '14px'
            }
        });

        // Initialize
        initExam();

        // Re-render mermaid after each render
        const originalRenderExam = renderExam;
        renderExam = function() {
            originalRenderExam();
            setTimeout(() => {
                try {
                    mermaid.init(undefined, '.mermaid');
                } catch(e) {
                    console.warn('Mermaid rendering error:', e);
                }
            }, 100);
        };

        // Keyboard navigation: Enter to go to next question
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && state.examShowExplanation) {
                e.preventDefault();
                nextExamQuestion();
            }
        });
    </script>
</body>
</html>
