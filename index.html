<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Developer Certification - 100 Question Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --border: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --accent-yellow: #fbbf24;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        .app-header {
            text-align: center;
            padding: 30px 16px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .app-header h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .app-header p { color: var(--text-secondary); font-size: 1em; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        @media (min-width: 640px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
        }
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-number {
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { color: var(--text-secondary); margin-top: 4px; font-size: 0.85em; }

        /* Progress */
        .progress-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .progress-section h2 {
            font-size: 1.2em;
            margin-bottom: 12px;
            text-align: center;
            color: var(--text-primary);
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .category-progress { margin: 14px 0; }
        .category-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.85em;
        }
        .category-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .category-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .progress-text { text-align: center; color: var(--text-secondary); font-size: 0.9em; margin-bottom: 12px; }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 18px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            font-weight: 500;
            font-family: inherit;
        }
        .nav-tab:hover { background: var(--border); }
        .nav-tab.active { background: var(--accent-blue); color: var(--bg-primary); border-color: var(--accent-blue); }
        .reset-btn {
            padding: 10px 18px;
            border: 1px solid var(--accent-red);
            background: transparent;
            color: var(--accent-red);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            font-family: inherit;
        }
        .reset-btn:hover { background: rgba(239, 68, 68, 0.1); }

        /* Filters */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar span { color: var(--text-secondary); font-size: 0.85em; }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
            font-family: inherit;
        }
        .filter-btn:hover { background: var(--border); }
        .filter-btn.active { background: var(--accent-blue); color: var(--bg-primary); border-color: var(--accent-blue); }

        /* Cards */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 640px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }
        @media (min-width: 1024px) {
            .card-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
        }
        .flip-card {
            perspective: 1000px;
            height: 300px;
            cursor: pointer;
        }
        @media (min-width: 640px) {
            .flip-card { height: 340px; }
        }
        @media (min-width: 1024px) {
            .flip-card { height: 360px; }
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .flip-card-front {
            background: var(--bg-card);
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-image-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 12px;
            animation: fadeOutAfter4s 4.5s forwards;
            z-index: 5;
            pointer-events: none;
        }
        @keyframes fadeOutAfter4s {
            0%, 88.8% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        .flip-card-back {
            background: linear-gradient(135deg, #1e3a5f, #312e81);
            transform: rotateY(180deg);
            overflow-y: auto;
            position: relative;
            padding-bottom: 50px;
        }
        .card-number {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 0.8em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .card-category {
            position: absolute;
            top: 10px;
            right: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 500;
        }
        .cat-1 { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .cat-2 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .cat-3 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .cat-4 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .cat-5 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }

        .card-question {
            font-size: 0.95em;
            text-align: center;
            line-height: 1.5;
            color: var(--text-primary);
            padding-top: 24px;
            word-break: break-word;
        }
        .card-answer {
            font-size: 0.9em;
            text-align: left;
            line-height: 1.5;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .card-hint-text {
            margin-top: 12px;
            font-size: 0.8em;
            color: var(--text-secondary);
        }
        .hint-btn {
            position: absolute;
            bottom: 10px;
            left: 12px;
            padding: 5px 12px;
            border: 1px solid var(--accent-blue);
            background: transparent;
            color: var(--accent-blue);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            font-family: inherit;
        }
        .hint-btn:hover { background: rgba(56, 189, 248, 0.1); }
        .mastery-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
            font-family: inherit;
        }
        .mastery-btn:hover { background: #7dd3fc; }
        .mastery-btn.mastered { background: var(--accent-green); color: #fff; }
        .memory-aid {
            margin-top: 8px;
            padding: 10px;
            background: rgba(251, 191, 36, 0.1);
            border-radius: 8px;
            border: 1px dashed var(--accent-yellow);
        }
        .memory-aid .emoji { font-size: 1.3em; margin-bottom: 4px; }
        .memory-aid .text { color: var(--accent-yellow); font-size: 0.85em; font-style: italic; }

        /* Hint Popup */
        .hint-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-y: auto;
        }
        .hint-popup {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-blue);
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            animation: popIn 0.3s;
            position: relative;
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .hint-popup .emoji { font-size: 3em; margin-bottom: 12px; }
        .hint-popup .svg-wrap { margin: 12px 0; }
        .hint-popup .hint-text { font-size: 1em; line-height: 1.5; margin-bottom: 12px; }
        .hint-popup .memory { color: var(--accent-yellow); font-style: italic; font-size: 0.95em; margin: 12px 0; padding: 12px; background: rgba(251, 191, 36, 0.1); border-radius: 8px; }
        .hint-popup .close-btn {
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid var(--text-muted);
            background: transparent;
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-family: inherit;
        }
        .hint-popup .close-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Quiz */
        .quiz-container { max-width: 700px; margin: 0 auto; }
        .quiz-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        @media (min-width: 640px) {
            .quiz-card { padding: 32px; }
        }
        .quiz-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quiz-question {
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            margin-bottom: 20px;
            line-height: 1.5;
            word-break: break-word;
        }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        .quiz-option {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 0.95em;
            font-family: inherit;
            line-height: 1.4;
            word-break: break-word;
        }
        .quiz-option:hover { border-color: var(--accent-blue); }
        .quiz-option.correct { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.1); }
        .quiz-option.incorrect { border-color: var(--accent-red); background: rgba(239, 68, 68, 0.1); }
        .quiz-option:disabled { cursor: default; opacity: 0.8; }
        .quiz-hint-btn {
            margin: 16px 0;
            padding: 10px 20px;
            border: 1px dashed var(--accent-yellow);
            background: transparent;
            color: var(--accent-yellow);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-block;
        }
        .quiz-hint-btn:hover { background: rgba(251, 191, 36, 0.1); }
        .quiz-hint-box {
            margin-top: 16px;
            padding: 20px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 12px;
            border: 1px solid var(--accent-blue);
            text-align: center;
        }
        .quiz-hint-box .emoji { font-size: 2.5em; margin-bottom: 8px; }
        .quiz-hint-box .hint-text { color: var(--text-primary); font-size: 0.95em; }
        .quiz-hint-box .memory { color: var(--accent-yellow); margin-top: 8px; font-style: italic; font-size: 0.9em; }
        .quiz-explanation {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 10px;
            border-left: 4px solid var(--accent-blue);
        }
        .quiz-explanation strong { color: var(--accent-blue); }
        .quiz-explanation p { margin-top: 8px; }
        .quiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 12px;
        }
        .quiz-nav button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            font-family: inherit;
        }
        .quiz-nav button:hover { background: #7dd3fc; }
        .quiz-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Resources */
        .resources-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .resources-section h3 {
            color: var(--accent-blue);
            margin-bottom: 16px;
            font-size: 1.2em;
        }
        .resource-category { margin-bottom: 20px; }
        .resource-category h4 { color: var(--text-primary); margin-bottom: 10px; font-size: 1em; }
        .resource-list { list-style: none; }
        .resource-list li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .resource-list li:last-child { border-bottom: none; }
        .resource-link {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s;
            word-break: break-all;
        }
        .resource-link:hover { color: #7dd3fc; text-decoration: underline; }
        .resource-desc { color: var(--text-secondary); font-size: 0.9em; margin-left: 8px; }

        /* Footer */
        .app-footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9em;
        }
        .app-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s;
        }
        .app-footer a:hover { color: #7dd3fc; text-decoration: underline; }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .footer-links a { display: inline-flex; align-items: center; gap: 6px; }

        /* SVG Colors */
        .svg-agentic { stroke: var(--accent-red); }
        .svg-mcp { stroke: var(--accent-blue); }
        .svg-claude { stroke: var(--accent-green); }
        .svg-prompt { stroke: var(--accent-orange); }
        .svg-reliability { stroke: var(--accent-purple); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease; }

/* Footnote & JSON Viewer */
        .card-footnote {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-size: 0.7em;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s;
        }
        .card-footnote:hover { color: var(--accent-blue); }
        .json-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .json-popup {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: popIn 0.3s;
        }
        .json-popup h3 { margin-bottom: 12px; color: var(--accent-blue); }
        .json-popup pre {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85em;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .json-popup .media-section { margin-top: 16px; }
        .json-popup iframe {
            width: 100%;
            height: 360px;
            border-radius: 12px;
            border: none;
            margin-bottom: 12px;
        }
        .json-popup audio { width: 100%; margin-top: 8px; }
        .claude-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 8px;
            background: linear-gradient(135deg, #d97757, #c45b3a);
            color: #fff;
            font-weight: 600;
            font-size: 0.85em;
            text-decoration: none;
            transition: opacity 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .claude-btn:hover { opacity: 0.9; }
        .card-claude-btn {
            position: absolute;
            bottom: 10px;
            right: 80px;
            padding: 5px 10px;
            font-size: 0.75em;
        }

        /* Debug Mode */
        .debug-nav { display: none; }
        body.debug-mode .debug-nav { display: inline-flex; }
        .debug-toggle {
            position: fixed;
            bottom: 10px;
            left: 10px;
            padding: 6px 12px;
            font-size: 0.75em;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            z-index: 50;
            font-family: inherit;
        }
        body.debug-mode .debug-toggle { color: var(--accent-yellow); border-color: var(--accent-yellow); }

        /* Slideshow */
        .slideshow-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .slide-progress {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--text-muted);
            font-size: 0.9em;
        }
        .slide-content h2 { margin-bottom: 24px; color: var(--accent-blue); }
        .slide-hint { margin: 20px 0; padding: 20px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; border: 1px dashed var(--accent-blue); }
        .slide-answer { margin-top: 24px; padding: 20px; background: rgba(16, 185, 129, 0.1); border-radius: 12px; border: 1px solid var(--accent-green); display: none; }
        .slide-answer.show { display: block; animation: fadeIn 0.3s ease; }
        .slideshow-nav { display: flex; gap: 20px; margin-top: 30px; }

        /* Analyse & Evaluate */
        .concept-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 24px; }
        .concept-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.3s ease;
        }
        .concept-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        .concept-card h3 { color: var(--accent-blue); margin-bottom: 12px; }
        .concept-card p { color: var(--text-secondary); font-size: 0.95em; }
        .relationship-line {
            display: flex;

        function setCookie(name, value, days) {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/;SameSite=Strict';
        }
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        }
        function getProgress() {
            const progress = getCookie('claude_cert_progress_v2');
            if (progress) { try { return JSON.parse(progress); } catch(e) { return {}; } }
            return {};
        }

                        <div class="slide-answer ${state.showRememberAnswer ? 'show' : ''}">
                            <strong>Answer:</strong>
                            <p style="margin-top:10px">${escapeHtml(q.answer)}</p>
                            ${hint ? `<div class="memory-aid" style="margin-top:15px"><div class="text">${escapeHtml(hint.memory)}</div></div>` : ''}
                        </div>
                    </div>
                    <div class="slideshow-nav">
                        <button class="nav-tab" onclick="prevRemember()" ${state.rememberIndex === 0 ? 'disabled' : ''}>Previous</button>
                        <button class="nav-tab active" onclick="toggleRememberAnswer()">${state.showRememberAnswer ? 'Hide Answer' : 'Show Answer'}</button>
                        <button class="nav-tab" onclick="nextRemember()" ${state.rememberIndex === questionsData.length - 1 ? 'disabled' : ''}>Next</button>
                    </div>
                </div>`;
        }

        function renderAnalyse() {
            const concepts = [
                { title: "Agentic Loops", desc: "Iterative cycles of Perceive, Think, and Act that allow models to self-correct and reason through complex tasks." },
                { title: "Coordinator-Subagent", desc: "An architectural pattern where a central 'brain' delegates specialized tasks to focused sub-agents." },
                { title: "MCP (Model Context Protocol)", desc: "A standardized protocol that decouples AI models from their tools and data sources, enabling universal integration." },
                { title: "Chain-of-Thought", desc: "A prompting technique that forces models to output their reasoning steps before providing a final answer." },
                { title: "Validation Loops", desc: "Automated checks that verify model output against schemas or criteria, triggering re-prompts on failure." },
                { title: "Long-Term Memory", desc: "The use of external storage (RAG, Vector DBs) to maintain context beyond the model's immediate window." }
            ];
            return `
                <div class="fade-in">
                    <h2 style="text-align:center; margin-bottom:20px;">Key Concepts Analysis</h2>
                    <p style="text-align:center; color:var(--text-secondary); max-width:600px; margin: 0 auto 30px;">Breaking down the core components of the Claude Developer Certification.</p>
                    <div class="concept-grid">
                        ${concepts.map(c => `
                            <div class="concept-card">
                                <h3>${c.title}</h3>
                                <p>${c.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderEvaluate() {
            const relations = [
                { icon: "🔗", title: "Loops + Tools", desc: "Agentic loops rely on MCP tools to interact with the real world, turning passive models into active agents." },
                { icon: "🧠", title: "Prompts + Reasoning", desc: "Advanced prompt engineering (Few-Shot, CoT) directly scales the quality of 'Thinking' in the Perceive-Think-Act cycle." },
                { icon: "🛡️", title: "Reliability + Context", desc: "Circuit breakers and fallback strategies are essential when managing large context windows and external RAG lookups." },
                { icon: "⚙️", title: "Claude Code + Workflow", desc: "CLAUDE.md acts as the 'Sinthome' or stabilizing force that ensures agents adhere to project-specific constraints." }
            ];
            return `
                <div class="fade-in">
                    <h2 style="text-align:center; margin-bottom:20px;">Conceptual Relationships</h2>
                    <p style="text-align:center; color:var(--text-secondary); max-width:600px; margin: 0 auto 30px;">Evaluating how different architectural components interact to create robust AI systems.</p>
                    <div style="max-width:800px; margin: 0 auto;">
                        ${relations.map(r => `
                            <div class="relationship-line">
                                <div class="rel-icon">${r.icon}</div>
                                <div class="rel-text">
                                    <strong>${r.title}</strong>
                                    <p>${r.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        function renderCreate() {
            return `
                <div class="fade-in">
                    <h2 style="text-align:center; margin-bottom:20px;">The Path to AGI</h2>
                    <p style="text-align:center; color:var(--text-secondary); max-width:600px; margin: 0 auto 30px;">Synthesizing certification concepts to visualize the evolution toward Artificial General Intelligence.</p>
                    
                    <div class="mermaid-section">
                        <h3>Phase 1: Static Intelligence</h3>
                        <pre class="mermaid">
                        graph LR
                            A[Input Prompt] --> B(LLM)
                            B --> C[Static Output]
                        </pre>
                        <div class="phase-desc">Basic request-response pattern. The model is a passive knowledge engine.</div>
                    </div>

                    <div class="mermaid-section">
                        <h3>Phase 2: Tool-Augmented Agency</h3>
                        <pre class="mermaid">
                        graph LR
                            A[User Goal] --> B(LLM)
                            B --> C{Tool Call?}
                            C -- Yes --> D[MCP Server]
                            D --> E[Execution]
                            E --> B
                            C -- No --> F[Final Answer]
                        </pre>
                        <div class="phase-desc">Models gain 'hands' through MCP, allowing them to fetch data and perform actions.</div>
                    </div>

                    <div class="mermaid-section">
                        <h3>Phase 3: Autonomous Loops</h3>
                        <pre class="mermaid">
                        graph TD
                            A[Complex Task] --> B[Perceive]
                            B --> C[Think/Reason]
                            C --> D[Act/Tool]
                            D --> E{Goal Met?}
                            E -- No --> B
                            E -- Yes --> F[Done]
                        </pre>
                        <div class="phase-desc">Iterative reasoning cycles allow for self-correction and complex problem solving.</div>
                    </div>

                    <div class="mermaid-section">
                        <h3>Phase 4: Multi-Agent Swarms</h3>
                        <pre class="mermaid">
                        graph TD
                            A[Project Goal] --> B[Coordinator]
                            B --> C[Agent: Code]
                            B --> D[Agent: Test]
                            B --> E[Agent: Doc]
                            C & D & E --> B
                            B --> F[Validated Solution]
                        </pre>
                        <div class="phase-desc">Specialized agents collaborate under a coordinator, mimicking human organizational structures.</div>
                    </div>

                    <div class="mermaid-section">
                        <h3>Phase 5: Self-Evolving AGI</h3>
                        <pre class="mermaid">
                        graph TD
                            A[Existence] --> B[Continuous Learning]
                            B --> C[Goal Synthesis]
                            C --> D[System Modification]
                            D --> E[Improved Base]
                            E --> B
                        </pre>
                        <div class="phase-desc">Autonomous systems that define their own goals and improve their own architecture iteratively.</div>
                    </div>
                </div>`;
        }

        function prevRemember() {
            if (state.rememberIndex > 0) {
                state.rememberIndex--;
                state.showRememberAnswer = false;
                render();
            }
        }

        function nextRemember() {
            if (state.rememberIndex < questionsData.length - 1) {
                state.rememberIndex++;
                state.showRememberAnswer = false;
                render();
            }
        }

        function toggleRememberAnswer() {
            state.showRememberAnswer = !state.showRememberAnswer;
            render();
        }

        function renderResources() {
            return youtubeResources.map(cat => `
                <div class="resources-section fade-in">
                    <h3>${escapeHtml(cat.category)}</h3>
                    <ul class="resource-list">
                        ${cat.videos.map(v => `
                            <li>
                                <a href="${v.url}" target="_blank" rel="noopener noreferrer" class="resource-link">${escapeHtml(v.title)}</a>
                                <span class="resource-desc">- ${escapeHtml(v.desc)}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function renderFooter() {
            return `
                <footer class="app-footer">
                    <p>Built for the Claude Developer Certification Exam</p>
                    <div class="footer-links">
                        <a href="https://www.linkedin.com/in/rifaterdemsahin/" target="_blank" rel="noopener noreferrer">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            Rifat Erdem Sahin on LinkedIn
                        </a>
                        <a href="https://rifaterdemsahin.github.io/claude_certification_exam/" target="_blank">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            View on GitHub
                        </a>
                    </div>
                </footer>`;
        }

        // ================== ACTIONS ==================
        function setTab(tab) {
            state.activeTab = tab;
            if (tab === 'quiz') {
                const unmastered = questionsData.filter(q => !(state.progress[q.category] || []).includes(q.id));
                // If everything is mastered, allow re-quizzing everything
                state.quizQuestions = (unmastered.length > 0 ? unmastered : [...questionsData]).sort(() => Math.random() - 0.5);
                state.quizIndex = 0;
                state.quizSelected = null;
                state.quizShowExplanation = false;
                state.quizShowHint = false;
                generateQuizOptions();
            }
            render();
        }

        function generateQuizOptions() {
            if (state.quizQuestions.length === 0) return;
            const q = state.quizQuestions[state.quizIndex];
            const wrong = questionsData
                .filter(x => x.id !== q.id && x.category === q.category)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(x => x.answer);
            while (wrong.length < 3) {
                const r = questionsData[Math.floor(Math.random() * questionsData.length)];
                if (r.id !== q.id && !wrong.includes(r.answer)) wrong.push(r.answer);
            }
            state.quizOptions = [...wrong, q.answer].sort(() => Math.random() - 0.5);
        }

        function setFilter(filter) {
            state.filter = filter;
            render();
        }

        function shuffleCards() {
            if (state.shuffledIds) {
                state.shuffledIds = null;
            } else {
                state.shuffledIds = [...questionsData].sort(() => Math.random() - 0.5).map(q => q.id);
            }
            render();
        }

        function flipCard(id) {
            const card = document.getElementById('card-' + id);
            if (card) card.classList.toggle('flipped');
        }

        function toggleMastery(category, questionId) {
            const prog = { ...state.progress };
            if (!prog[category]) prog[category] = [];
            const idx = prog[category].indexOf(questionId);
            if (idx > -1) prog[category].splice(idx, 1);
            else prog[category].push(questionId);
            state.progress = prog;
            saveProgress(prog);
            render();
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress? This will clear all mastered questions.')) {
                state.progress = {};
                saveProgress({});
                if (state.activeTab === 'quiz') setTab('quiz');
                else render();
            }
        }

        function showHint(questionId) {
            const q = questionsData.find(x => x.id === questionId);
            const hint = questionHints[questionId];
            if (!hint) return;
            const popup = document.createElement('div');
            popup.className = 'hint-overlay';
            popup.innerHTML = `
                <div class="hint-popup">
                    <div class="emoji">${hint.emoji}</div>
                    <div class="svg-wrap" style="color:${categories[q.category].color}">${getCategorySVG(q.category)}</div>
                    <div class="hint-text"><strong style="color:${categories[q.category].color}">Visual Hint:</strong><br/>${escapeHtml(hint.text)}</div>
                    <div class="memory">Memory Aid:<br/>${escapeHtml(hint.memory)}</div>
                    <div style="margin-top:16px;">
                        <a href="https://claude.ai/new?q=${encodeURIComponent(q.claudePrompt || '')}" target="_blank" rel="noopener noreferrer" class="claude-btn" onclick="event.stopPropagation()">🎓 Ask Claude TA</a>
                    </div>
                    <div class="media-section" style="margin-top:16px;text-align:left;">
                        <h4 style="color:var(--text-secondary);margin-bottom:8px;">🎬 Video Explanation</h4>
                        <iframe src="${escapeHtml(q.youtubeShortUrl || '')}" style="width:100%;height:240px;border:none;border-radius:12px;" allowfullscreen></iframe>
                        <h4 style="color:var(--text-secondary);margin-bottom:8px;margin-top:12px;">🎧 Audio Explanation</h4>
                        <audio controls src="${escapeHtml(q.audioUrl || '')}" style="width:100%;"></audio>
                    </div>
                    <button class="close-btn" onclick="this.closest('.hint-overlay').remove()">Got it!</button>
                </div>`;
            popup.addEventListener('click', e => {
                if (e.target === popup) popup.remove();
            });
            document.body.appendChild(popup);
        }

        function selectQuizOption(idx, option) {
            const q = state.quizQuestions[state.quizIndex];
            state.quizSelected = option;
            state.quizShowExplanation = true;
            if (option === q.answer) {
                if (!(state.progress[q.category] || []).includes(q.id)) {
                    toggleMastery(q.category, q.id);
                    return; // toggleMastery calls render
                }
            }
            render();
        }

        function toggleQuizHint() {
            state.quizShowHint = !state.quizShowHint;
            render();
        }

        function nextQuiz() {
            if (state.quizIndex < state.quizQuestions.length - 1) {
                state.quizIndex++;
                state.quizSelected = null;
                state.quizShowExplanation = false;
                state.quizShowHint = false;
                generateQuizOptions();
                render();
            }
        }

        function prevQuiz() {
            if (state.quizIndex > 0) {
                state.quizIndex--;
                state.quizSelected = null;
                state.quizShowExplanation = false;
                state.quizShowHint = false;
                generateQuizOptions();
                render();
            }
        }

// ================== JSON & DEBUG ==================
        function showJSON(questionId) {
            const q = questionsData.find(x => x.id === questionId);
            if (!q) return;
            const popup = document.createElement('div');
            popup.className = 'json-overlay';
            const jsonStr = JSON.stringify(q, null, 2);
            popup.innerHTML = `
                <div class="json-popup">
                    <h3>📄 JSON Source for ${escapeHtml(q.uid || 'Q'+q.id)}</h3>
                    <pre>${escapeHtml(jsonStr)}</pre>
                    <div class="media-section">
                        <h4 style="color:var(--text-secondary);margin-bottom:8px;">🎬 Video Explanation</h4>
                        <iframe src="${escapeHtml(q.youtubeShortUrl || '')}" allowfullscreen></iframe>
                        <h4 style="color:var(--text-secondary);margin-bottom:8px;">🎧 Audio Explanation</h4>
                        <audio controls src="${escapeHtml(q.audioUrl || '')}"></audio>
                    </div>
                    <div style="text-align:center;margin-top:16px;">
                        <a href="https://claude.ai/new?q=${encodeURIComponent(q.claudePrompt || '')}" target="_blank" rel="noopener noreferrer" class="claude-btn">🎓 Ask Claude TA</a>
                    </div>
                    <div style="text-align:center;margin-top:12px;">
                        <button class="close-btn" onclick="this.closest('.json-overlay').remove()">Close</button>
                    </div>
                </div>`;
            popup.addEventListener('click', e => {
                if (e.target === popup) popup.remove();
            });
            document.body.appendChild(popup);
        }

        function renderJSONSource() {
            return `
                <div class="fade-in" style="max-width:900px;margin:0 auto;">
                    <h2 style="text-align:center;margin-bottom:20px;">📄 Questions JSON Source</h2>
                    <pre style="background:var(--bg-primary);padding:20px;border-radius:12px;border:1px solid var(--border);overflow-x:auto;font-size:0.8em;">${escapeHtml(JSON.stringify(questionsData, null, 2))}</pre>
                </div>`;
        }

        function renderFooterLinks() {
            return `
                <div class="fade-in" style="max-width:700px;margin:0 auto;">
                    <h2 style="text-align:center;margin-bottom:20px;">🔗 Footer Links</h2>
                    <div class="resources-section">
                        <ul class="resource-list">
                            <li><a href="https://www.linkedin.com/in/rifaterdemsahin/" target="_blank" rel="noopener noreferrer" class="resource-link">Rifat Erdem Sahin on LinkedIn</a></li>
                            <li><a href="https://rifaterdemsahin.github.io/claude_certification_exam/" target="_blank" rel="noopener noreferrer" class="resource-link">View on GitHub</a></li>
                        </ul>
                    </div>
                </div>`;
        }

        function toggleDebug() {
            document.body.classList.toggle('debug-mode');
            setCookie('claude_cert_debug', document.body.classList.contains('debug-mode') ? '1' : '0', 365);
            render();
        }
        // ================== MAIN RENDER ==================
        function render() {
            const app = document.getElementById('app');
            let content = renderHeader() + '<div class="container">';
            content += renderStats();
            content += renderProgress();
            content += renderNav();

            if (state.activeTab === 'cards') content += renderMemoryCards();
            else if (state.activeTab === 'quiz') content += renderQuiz();
            else if (state.activeTab === 'remember') content += renderRemember();
            else if (state.activeTab === 'analyse') content += renderAnalyse();
            else if (state.activeTab === 'evaluate') content += renderEvaluate();
            else if (state.activeTab === 'create') content += renderCreate();
            else if (state.activeTab === 'resources') content += renderResources();
            else if (state.activeTab === 'json') content += renderJSONSource();
            else if (state.activeTab === 'footerlinks') content += renderFooterLinks();

            content += '</div>' + renderFooter();
            app.innerHTML = content;

            // Re-run mermaid if we are on the create tab
            if (state.activeTab === 'create' && typeof mermaid !== 'undefined') {
                mermaid.init(undefined, ".mermaid");
            }
        }

        // ================== INIT ==================
        document.addEventListener('DOMContentLoaded', () => {
            if (getCookie('claude_cert_debug') === '1') document.body.classList.add('debug-mode');
            render();
        });
    </script>
</body>
</html>
