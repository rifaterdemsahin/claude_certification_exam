<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Developer Certification - 100 Question Mastery</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .app-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;
        }
        .app-header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .app-header p { color: #94a3b8; font-size: 1.1em; }

        .nav-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 12px 24px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: 500;
        }
        .nav-tab:hover { background: #334155; }
        .nav-tab.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: #94a3b8; margin-top: 8px; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .flip-card {
            perspective: 1000px;
            height: 280px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
        }
        .flip-card-front {
            background: #1e293b;
            align-items: center;
            justify-content: center;
        }
        .flip-card-back {
            background: linear-gradient(135deg, #1e3a5f, #312e81);
            transform: rotateY(180deg);
            overflow-y: auto;
        }
        .card-number {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 0.85em;
            color: #64748b;
            font-weight: 600;
        }
        .card-category {
            position: absolute;
            top: 12px;
            right: 16px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }
        .cat-1 { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .cat-2 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .cat-3 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .cat-4 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .cat-5 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }

        .card-question {
            font-size: 1.05em;
            text-align: center;
            line-height: 1.5;
            color: #e2e8f0;
            padding-top: 20px;
        }
        .card-answer {
            font-size: 0.95em;
            text-align: left;
            line-height: 1.6;
            color: #e2e8f0;
            margin-bottom: 16px;
        }
        .card-hint {
            margin-top: 16px;
            font-size: 0.85em;
            color: #94a3b8;
        }
        .hint-btn {
            position: absolute;
            bottom: 12px;
            left: 16px;
            padding: 6px 14px;
            border: 1px solid #38bdf8;
            background: transparent;
            color: #38bdf8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            z-index: 10;
        }
        .hint-btn:hover { background: rgba(56, 189, 248, 0.1); }
        .mastery-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        .mastery-btn:hover { background: #7dd3fc; }
        .mastery-btn.mastered { background: #10b981; color: white; }

        .hint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.98);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 20;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hint-emoji { font-size: 3em; margin-bottom: 12px; }
        .hint-svg { margin: 12px 0; }
        .hint-text { 
            font-size: 0.95em; 
            text-align: center; 
            color: #e2e8f0; 
            line-height: 1.5;
            margin-top: 8px;
        }
        .hint-memory { 
            font-size: 0.85em; 
            color: #fbbf24; 
            text-align: center;
            margin-top: 12px;
            font-style: italic;
        }
        .close-hint-btn {
            margin-top: 20px;
            padding: 8px 20px;
            border: 1px solid #64748b;
            background: transparent;
            color: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .close-hint-btn:hover { border-color: #38bdf8; color: #38bdf8; }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #cbd5e1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        .filter-btn:hover { background: #334155; }
        .filter-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }

        .progress-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #a855f7);
            border-radius: 5px;
            transition: width 0.5s;
        }
        .category-progress {
            margin: 16px 0;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .category-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        .category-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }

        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .quiz-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 24px;
        }
        .quiz-question {
            font-size: 1.3em;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .quiz-option {
            padding: 16px 20px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
        }
        .quiz-option:hover { border-color: #38bdf8; }
        .quiz-option.correct { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .quiz-option.incorrect { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .quiz-explanation {
            margin-top: 20px;
            padding: 20px;
            background: #0f172a;
            border-radius: 10px;
            border-left: 4px solid #38bdf8;
        }
        .quiz-hint-btn {
            margin-top: 16px;
            padding: 10px 20px;
            border: 1px dashed #fbbf24;
            background: transparent;
            color: #fbbf24;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .quiz-hint-btn:hover { background: rgba(251, 191, 36, 0.1); }
        .quiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }
        .quiz-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }
        .quiz-btn:hover { background: #7dd3fc; }
        .quiz-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .reset-btn {
            padding: 10px 20px;
            border: 1px solid #ef4444;
            background: transparent;
            color: #ef4444;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        .reset-btn:hover { background: rgba(239, 68, 68, 0.1); }

        .resources-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .resources-section h3 {
            color: #38bdf8;
            margin-bottom: 16px;
            font-size: 1.3em;
        }
        .resource-category {
            margin-bottom: 20px;
        }
        .resource-category h4 {
            color: #e2e8f0;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .resource-list {
            list-style: none;
            padding: 0;
        }
        .resource-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .resource-list li:last-child { border-bottom: none; }
        .resource-link {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.3s;
        }
        .resource-link:hover { color: #7dd3fc; text-decoration: underline; }
        .resource-desc {
            color: #94a3b8;
            font-size: 0.9em;
            margin-left: 8px;
        }

        .hint-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            z-index: 1000;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: popIn 0.3s;
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .hint-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
        .hint-popup-emoji { font-size: 4em; text-align: center; margin-bottom: 16px; }
        .hint-popup-svg { text-align: center; margin: 16px 0; }
        .hint-popup-text { text-align: center; font-size: 1.1em; line-height: 1.6; margin-bottom: 12px; }
        .hint-popup-memory { text-align: center; color: #fbbf24; font-style: italic; font-size: 1em; margin: 12px 0; padding: 12px; background: rgba(251, 191, 36, 0.1); border-radius: 8px; }
        .hint-popup-close {
            display: block;
            margin: 20px auto 0;
            padding: 10px 24px;
            border: 1px solid #64748b;
            background: transparent;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        .hint-popup-close:hover { border-color: #38bdf8; color: #38bdf8; }

        @media (max-width: 768px) {
            .app-header h1 { font-size: 1.8em; }
            .card-grid { grid-template-columns: 1fr; }
            .flip-card { height: 260px; }
            .hint-popup { max-width: 90%; padding: 20px; }
        }
    </style>
</head>

    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        // SVG Hints for categories
        const getCategorySVG = (categoryId) => {
            const svgs = {

                    <svg viewBox="0 0 100 100" width="60" height="60" style={{ stroke: "currentColor", fill: "none" }}>

        // Hints and memory aids
        const questionHints = {
            1: { emoji: "🔄🧠", text: "Think of a never-ending cycle", memory: "PERCEIVE (eyes) → THINK (brain) → ACT (hands) → REPEAT" },
            2: { emoji: "👑🤖", text: "One boss, many workers", memory: "Coordinator = Traffic Cop, Subagents = Cars following directions" },
            3: { emoji: "🧩📋", text: "Break big into small", memory: "Like JIRA tickets - one epic becomes multiple stories" },

            { id: 97, category: 5, question: "What is 'monitoring and alerting' for agents?", answer: "Tracking agent performance and sending alerts when error rates or latency exceed thresholds." },
            { id: 98, category: 5, question: "What is 'request idempotency' in reliability?", answer: "Ensuring that retrying a failed request doesn't cause duplicate or conflicting actions." },
            { id: 99, category: 5, question: "What is 'chaos engineering' for AI systems?", answer: "Intentionally introducing failures to test and improve system resilience." },
            { id: 100, category: 5, question: "What is 'observability' in agent systems?", answer: "The ability to understand internal system states through logs, metrics, and traces." }
        ];

        const categories = {
            1: { name: "Agentic Architecture", color: "#ef4444", weight: "27%" },
            2: { name: "Tool Design & MCP", color: "#3b82f6", weight: "18%" },
            3: { name: "Claude Code Workflows", color: "#10b981", weight: "20%" },
            4: { name: "Prompt Engineering", color: "#f59e0b", weight: "20%" },
            5: { name: "Context & Reliability", color: "#a855f7", weight: "15%" }
        };

        // Cookie utilities
        const setCookie = (name, value, days) => {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/;SameSite=Strict';
        };

        const getCookie = (name) => {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return null;
        };

        const getProgress = () => {
            const progress = getCookie('claude_cert_progress_v2');
            if (progress) {
                try { return JSON.parse(progress); } catch(e) { return {}; }
            }
            return {};
        };

        const saveProgress = (progress) => {
            setCookie('claude_cert_progress_v2', JSON.stringify(progress), 365);
        };

        // Hint Popup Component
        const HintPopup = ({ questionId, categoryId, onClose }) => {
            const hint = questionHints[questionId] || { emoji: "💡", text: "Think about the key concepts in this category", memory: "Review the category fundamentals" };
            const svg = getCategorySVG(categoryId);
            
            return (
                <>
                    <div className="hint-popup-overlay" onClick={onClose}></div>
                    <div className="hint-popup">
                        <div className="hint-popup-emoji">{hint.emoji}</div>
                        <div className="hint-popup-svg" style={{ color: categories[categoryId].color }}>{svg}</div>
                        <div className="hint-popup-text">
                            <strong style={{ color: categories[categoryId].color }}>Visual Hint:</strong><br/>
                            {hint.text}
                        </div>
                        <div className="hint-popup-memory">
                            💭 Memory Aid:<br/>{hint.memory}
                        </div>
                        <button className="hint-popup-close" onClick={onClose}>Got it!</button>
                    </div>
                </>
            );
        };

        // Components
        const Header = () => (
            <header className="app-header">
                <h1>Claude Developer Certification</h1>
                <p>100 Question Mastery with Visual Hints & Memory Aids</p>
            </header>
        );

        const StatsBar = ({ progress }) => {
            const totalMastered = Object.values(progress).flat().length;
            const totalQuestions = questionsData.length;
            const percentage = Math.round((totalMastered / totalQuestions) * 100);
            
            return (
                <div className="stats-grid">
                    <div className="stat-card">
                        <div className="stat-number">{totalQuestions}</div>
                        <div className="stat-label">Total Questions</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-number">{totalMastered}</div>
                        <div className="stat-label">Mastered</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-number">{percentage}%</div>
                        <div className="stat-label">Completion</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-number">{questionsData.length - totalMastered}</div>
                        <div className="stat-label">Remaining</div>
                    </div>
                </div>
            );
        };

        const ProgressSection = ({ progress }) => {
            const totalMastered = Object.values(progress).flat().length;
            const overallPercentage = (totalMastered / questionsData.length) * 100;
            
            const categoryProgress = {};
            questionsData.forEach(q => {
                if (!categoryProgress[q.category]) categoryProgress[q.category] = { total: 0, mastered: 0 };
                categoryProgress[q.category].total++;
                if ((progress[q.category] || []).includes(q.id)) {
                    categoryProgress[q.category].mastered++;
                }
            });

            return (
                <div className="progress-section">
                    <h2 style={{ marginBottom: '16px', textAlign: 'center' }}>Study Progress</h2>
                    <div className="progress-bar">
                        <div className="progress-fill" style={{ width: overallPercentage + '%' }}></div>
                    </div>
                    <div style={{ textAlign: 'center', color: '#94a3b8', marginBottom: '20px' }}>
                        {totalMastered} of {questionsData.length} questions mastered ({Math.round(overallPercentage)}%)
                    </div>
                    {Object.entries(categoryProgress).map(([catId, stats]) => {
                        const pct = (stats.mastered / stats.total) * 100;
                        return (
                            <div key={catId} className="category-progress">
                                <div className="category-header">
                                    <span style={{ color: categories[catId].color }}>{categories[catId].name} ({categories[catId].weight})</span>
                                    <span>{stats.mastered}/{stats.total}</span>
                                </div>
                                <div className="category-bar">
                                    <div className="category-fill" style={{ width: pct + '%', background: categories[catId].color }}></div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const ResourcesSection = () => (
            <div className="resources-section">
                <h3>📚 Learning Resources</h3>
                {youtubeResources.map((category, idx) => (
                    <div key={idx} className="resource-category">
                        <h4>{category.category}</h4>
                        <ul className="resource-list">
                            {category.videos.map((video, vidx) => (
                                <li key={vidx}>
                                    <a href={video.url} target="_blank" rel="noopener noreferrer" className="resource-link">
                                        🎥 {video.title}
                                    </a>
                                    <span className="resource-desc">- {video.desc}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                ))}
            </div>
        );

        const MemoryCard = ({ question, progress, onToggle }) => {
            const [flipped, setFlipped] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const isMastered = (progress[question.category] || []).includes(question.id);
            const hint = questionHints[question.id];
            
            const toggleMastered = (e) => {
                e.stopPropagation();
                onToggle(question.category, question.id);
            };

            const handleHintClick = (e) => {
                e.stopPropagation();
                setShowHint(true);
            };

            return (
                <>
                    <div className={`flip-card ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                        <div className="flip-card-inner">
                            <div className="flip-card-front">
                                <span className="card-number">#{question.id}</span>
                                <span className={`card-category cat-${question.category}`}>{categories[question.category].name}</span>
                                <div className="card-question">{question.question}</div>
                                <div className="card-hint">Click to reveal answer</div>
                                <button className="hint-btn" onClick={handleHintClick}>💡 Need a Hint?</button>
                            </div>
                            <div className="flip-card-back">
                                <div className="card-answer">{question.answer}</div>
                                {hint && (
                                    <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(251, 191, 36, 0.1)', borderRadius: '8px', border: '1px dashed #fbbf24' }}>
                                        <div style={{ fontSize: '1.5em', marginBottom: '4px' }}>{hint.emoji}</div>
                                        <div style={{ color: '#fbbf24', fontSize: '0.9em', fontStyle: 'italic' }}>{hint.memory}</div>
                                    </div>
                                )}
                                <div style={{ marginTop: '16px', textAlign: 'center' }}>
                                    <button 
                                        className={`mastery-btn ${isMastered ? 'mastered' : ''}`}
                                        onClick={toggleMastered}
                                    >
                                        {isMastered ? '✓ Mastered' : 'Mark as Mastered'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    {showHint && (
                        <HintPopup 
                            questionId={question.id} 
                            categoryId={question.category} 
                            onClose={() => setShowHint(false)} 
                        />
                    )}
                </>
            );
        };

        const MemoryCardsView = ({ progress, onToggle, filter, setFilter }) => {
            const filteredQuestions = filter === 'all' 
                ? questionsData 
                : filter === 'mastered'
                    ? questionsData.filter(q => (progress[q.category] || []).includes(q.id))
                    : questionsData.filter(q => !(progress[q.category] || []).includes(q.id));

            return (
                <div>
                    <div className="filter-bar">
                        <span style={{ color: '#94a3b8', fontSize: '0.9em' }}>Filter:</span>
                        <button className={`filter-btn ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All Questions</button>
                        <button className={`filter-btn ${filter === 'unmastered' ? 'active' : ''}`} onClick={() => setFilter('unmastered')}>Unmastered</button>
                        <button className={`filter-btn ${filter === 'mastered' ? 'active' : ''}`} onClick={() => setFilter('mastered')}>Mastered</button>
                        {Object.entries(categories).map(([id, cat]) => (
                            <button key={id} className={`filter-btn ${filter === id ? 'active' : ''}`} onClick={() => setFilter(id)}>{cat.name}</button>
                        ))}
                    </div>
                    <div className="card-grid">
                        {filteredQuestions.map(q => (
                            <MemoryCard key={q.id} question={q} progress={progress} onToggle={onToggle} />
                        ))}
                    </div>
                </div>
            );
        };

        const QuizView = ({ progress, onToggle }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [quizQuestions, setQuizQuestions] = useState([...questionsData].sort(() => Math.random() - 0.5));
            
            const currentQuestion = quizQuestions[currentIndex];
            const isMastered = (progress[currentQuestion.category] || []).includes(currentQuestion.id);
            
            const generateOptions = (question) => {
                const wrongAnswers = questionsData
                    .filter(q => q.id !== question.id && q.category === question.category)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(q => q.answer);
                while (wrongAnswers.length < 3) {
                    const randomQ = questionsData[Math.floor(Math.random() * questionsData.length)];
                    if (randomQ.id !== question.id && !wrongAnswers.includes(randomQ.answer)) {
                        wrongAnswers.push(randomQ.answer);
                    }
                }
                return [...wrongAnswers, question.answer].sort(() => Math.random() - 0.5);
            };

            const [options, setOptions] = useState(generateOptions(currentQuestion));

            const handleNext = () => {
                if (currentIndex < quizQuestions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedOption(null);
                    setShowExplanation(false);
                    setShowHint(false);
                    const nextQ = quizQuestions[currentIndex + 1];
                    setOptions(generateOptions(nextQ));
                }
            };

            const handlePrev = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                    setSelectedOption(null);
                    setShowExplanation(false);
                    setShowHint(false);
                    const prevQ = quizQuestions[currentIndex - 1];
                    setOptions(generateOptions(prevQ));
                }
            };

            const handleAnswer = (option) => {
                setSelectedOption(option);
                setShowExplanation(true);
                if (option === currentQuestion.answer && !isMastered) {
                    onToggle(currentQuestion.category, currentQuestion.id);
                }
            };

            const hint = questionHints[currentQuestion.id];

            return (
                <div className="quiz-container">
                    <div className="quiz-card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px', alignItems: 'center' }}>
                            <span className={`card-category cat-${currentQuestion.category}`}>{categories[currentQuestion.category].name}</span>
                            <span style={{ color: '#64748b' }}>Question {currentIndex + 1} of {quizQuestions.length}</span>
                        </div>
                        <div className="quiz-question">{currentQuestion.question}</div>
                        <button className="quiz-hint-btn" onClick={() => setShowHint(!showHint)}>
                            {showHint ? '🔼 Hide Hint' : '💡 Show Visual Hint'}
                        </button>
                        {showHint && hint && (
                            <div style={{ 
                                marginTop: '16px', 
                                padding: '20px', 
                                background: 'rgba(56, 189, 248, 0.1)', 
                                borderRadius: '12px',
                                border: '1px solid #38bdf8',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '2.5em', marginBottom: '8px' }}>{hint.emoji}</div>
                                <div style={{ color: categories[currentQuestion.category].color }}>
                                    {getCategorySVG(currentQuestion.category)}
                                </div>
                                <div style={{ color: '#e2e8f0', marginTop: '8px', fontSize: '0.95em' }}>{hint.text}</div>
                                <div style={{ color: '#fbbf24', marginTop: '8px', fontSize: '0.9em', fontStyle: 'italic' }}>{hint.memory}</div>
                            </div>
                        )}
                        <div className="quiz-options">
                            {options.map((option, idx) => (
                                <button
                                    key={idx}
                                    className={`quiz-option ${
                                        showExplanation 
                                            ? option === currentQuestion.answer 
                                                ? 'correct' 
                                                : option === selectedOption 
                                                    ? 'incorrect' 
                                                    : '' 
                                            : ''
                                    }`}
                                    onClick={() => !showExplanation && handleAnswer(option)}
                                    disabled={showExplanation}
                                >
                                    {option}
                                </button>
                            ))}
                        </div>
                        {showExplanation && (
                            <div className="quiz-explanation">
                                <strong>{selectedOption === currentQuestion.answer ? 'Correct!' : 'The correct answer is:'}</strong>
                                <p style={{ marginTop: '8px' }}>{currentQuestion.answer}</p>
                                {hint && (
                                    <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(251, 191, 36, 0.1)', borderRadius: '8px' }}>
                                        <div style={{ fontSize: '1.3em' }}>{hint.emoji}</div>
                                        <div style={{ color: '#fbbf24', fontSize: '0.9em', fontStyle: 'italic' }}>{hint.memory}</div>
                                    </div>
                                )}
                            </div>
                        )}
                        <div className="quiz-nav">
                            <button className="quiz-btn" onClick={handlePrev} disabled={currentIndex === 0}>Previous</button>
                            <button className="quiz-btn" onClick={handleNext} disabled={currentIndex === quizQuestions.length - 1}>Next</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('cards');
            const [filter, setFilter] = useState('all');
            const [progress, setProgress] = useState(getProgress);

            const toggleMastery = (category, questionId) => {
                const newProgress = { ...progress };
                if (!newProgress[category]) newProgress[category] = [];
                
                const index = newProgress[category].indexOf(questionId);
                if (index > -1) {
                    newProgress[category].splice(index, 1);
                } else {
                    newProgress[category].push(questionId);
                }
                
                setProgress(newProgress);
                saveProgress(newProgress);
            };

            const resetProgress = () => {
                if (confirm('Are you sure you want to reset all progress?')) {
                    setProgress({});
                    saveProgress({});
                }
            };

            return (
                <div>
                    <Header />
                    <div className="container">
                        <StatsBar progress={progress} />
                        <ProgressSection progress={progress} />
                        
                        <div style={{ display: 'flex', justifyContent: 'center', gap: '10px', marginBottom: '30px' }}>
                            <button className="reset-btn" onClick={resetProgress}>Reset Progress</button>
                        </div>

                        <div className="nav-tabs">
                            <button className={`nav-tab ${activeTab === 'cards' ? 'active' : ''}`} onClick={() => setActiveTab('cards')}>Memory Cards</button>
                            <button className={`nav-tab ${activeTab === 'quiz' ? 'active' : ''}`} onClick={() => setActiveTab('quiz')}>Quiz Mode</button>
                            <button className={`nav-tab ${activeTab === 'resources' ? 'active' : ''}`} onClick={() => setActiveTab('resources')}>📚 Resources</button>
                        </div>

                        {activeTab === 'cards' && (
                            <MemoryCardsView 
                                progress={progress} 
                                onToggle={toggleMastery} 
                                filter={filter} 
                                setFilter={setFilter} 
                            />
                        )}
                        
                        {activeTab === 'quiz' && (
                            <QuizView progress={progress} onToggle={toggleMastery} />
                        )}

                        {activeTab === 'resources' && (
                            <ResourcesSection />
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
